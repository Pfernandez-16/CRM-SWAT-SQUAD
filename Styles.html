<style>
    /* ============================================
   CRM SWAT Squad — Premium Styles
   Dark/Light Theme with Glassmorphism
   ============================================ */

    /* ── CSS Variables ── */
    :root {
        --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --sidebar-w: 260px;
        --sidebar-collapsed-w: 68px;
        --topbar-h: 64px;
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Dark Theme (default) ── */
    [data-theme="dark"] {
        --bg-primary: #0a0a14;
        --bg-secondary: #12121f;
        --bg-card: #181830;
        --bg-surface: #1e1e38;
        --bg-hover: #252545;
        --bg-glass: rgba(255, 255, 255, 0.04);
        --bg-modal: rgba(10, 10, 20, 0.85);
        --accent-primary: #7c6cff;
        --accent-primary-soft: rgba(124, 108, 255, 0.15);
        --accent-success: #00d68f;
        --accent-success-soft: rgba(0, 214, 143, 0.12);
        --accent-warning: #f5a623;
        --accent-warning-soft: rgba(245, 166, 35, 0.12);
        --accent-danger: #ff6b6b;
        --accent-danger-soft: rgba(255, 107, 107, 0.12);
        --accent-info: #4fc3f7;
        --accent-info-soft: rgba(79, 195, 247, 0.12);
        --text-primary: #eaeaf0;
        --text-secondary: #8892b0;
        --text-muted: #5a6480;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.12);
        --input-bg: #14142a;
        --scrollbar-thumb: #2a2a50;
    }

    /* ── Light Theme ── */
    [data-theme="light"] {
        --bg-primary: #f5f7fa;
        --bg-secondary: #ffffff;
        --bg-card: #ffffff;
        --bg-surface: #f0f2f5;
        --bg-hover: #e8ecf0;
        --bg-glass: rgba(255, 255, 255, 0.7);
        --bg-modal: rgba(0, 0, 0, 0.4);
        --accent-primary: #5b4ee8;
        --accent-primary-soft: rgba(91, 78, 232, 0.1);
        --accent-success: #00b876;
        --accent-success-soft: rgba(0, 184, 118, 0.1);
        --accent-warning: #e09600;
        --accent-warning-soft: rgba(224, 150, 0, 0.1);
        --accent-danger: #e55353;
        --accent-danger-soft: rgba(229, 83, 83, 0.1);
        --accent-info: #1e88e5;
        --accent-info-soft: rgba(30, 136, 229, 0.1);
        --text-primary: #1a1a2e;
        --text-secondary: #5a6480;
        --text-muted: #99a3b8;
        --border: rgba(0, 0, 0, 0.08);
        --border-hover: rgba(0, 0, 0, 0.15);
        --input-bg: #f0f2f5;
        --scrollbar-thumb: #c0c8d4;
    }

    /* ── Login Screen ── */
    .login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: var(--bg-primary);
        padding: 1rem;
    }

    .login-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
        box-shadow: var(--shadow-lg);
    }

    .login-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-logo-icon {
        font-size: 2.5rem;
        display: block;
        margin-bottom: 0.5rem;
    }

    .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: 1px;
    }

    .login-subtitle {
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin-top: 0.4rem;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
    }

    .login-field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    .login-label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .login-input {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.7rem 0.9rem;
        font-size: 0.95rem;
        color: var(--text-primary);
        font-family: var(--font-family);
        outline: none;
        transition: var(--transition);
    }

    .login-input:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft);
    }

    .login-input::placeholder {
        color: var(--text-muted);
    }

    .login-error {
        color: var(--accent-danger);
        font-size: 0.82rem;
        text-align: center;
        margin: -0.3rem 0;
    }

    .login-btn {
        background: var(--accent-primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        padding: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: var(--font-family);
        cursor: pointer;
        transition: var(--transition);
        margin-top: 0.5rem;
    }

    .login-btn:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* ── Logout Button ── */
    .logout-btn {
        color: var(--text-muted);
        opacity: 0.7;
        transition: var(--transition);
        flex-shrink: 0;
    }

    .logout-btn:hover {
        color: var(--accent-danger);
        opacity: 1;
    }

    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html {
        font-size: 14px;
    }

    body {
        font-family: var(--font-family);
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
    }

    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
    }

    /* ── Loading ── */
    .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: var(--bg-primary);
    }

    .loader-container {
        text-align: center;
    }

    .loader-ring {
        width: 48px;
        height: 48px;
        border: 3px solid var(--border);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
    }

    .loader-text {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .spinning {
        animation: spin 0.8s linear infinite;
    }

    /* ── Layout ── */
    .app-layout {
        display: flex;
        height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: width 0.3s ease;
        flex-shrink: 0;
        overflow: hidden;
    }

    .sidebar.collapsed {
        width: var(--sidebar-collapsed-w);
    }

    .sidebar-header {
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        min-height: 65px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-icon {
        font-size: 1.6rem;
    }

    .logo-text {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .sidebar-toggle {
        margin-left: auto;
    }

    .sidebar-nav {
        flex: 1;
        padding: 12px 8px;
        overflow-y: auto;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-radius: var(--radius-md);
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
        text-decoration: none;
        margin-bottom: 2px;
        position: relative;
    }

    .nav-item:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
    }

    .nav-item.active {
        background: var(--accent-primary-soft);
        color: var(--accent-primary);
        font-weight: 600;
    }

    .nav-item.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 24px;
        background: var(--accent-primary);
        border-radius: 0 4px 4px 0;
    }

    .nav-icon {
        font-size: 22px;
        flex-shrink: 0;
    }

    .nav-label {
        font-size: 0.92rem;
        white-space: nowrap;
    }

    .nav-badge {
        margin-left: auto;
        background: var(--accent-primary);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 10px;
    }

    .sidebar-footer {
        border-top: 1px solid var(--border);
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 6px;
        flex: 1;
        border-radius: var(--radius-md);
    }

    .user-info:hover {
        background: var(--bg-hover);
    }

    .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-primary), #a78bfa);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.85rem;
        flex-shrink: 0;
    }

    .user-email {
        font-size: 0.8rem;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
        display: block;
    }

    /* ── Main Content ── */
    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: var(--topbar-h);
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
        flex-shrink: 0;
    }

    .page-title {
        font-size: 1.25rem;
        font-weight: 700;
    }

    .top-bar-right {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 0 12px;
        height: 38px;
    }

    .search-icon {
        font-size: 18px;
        color: var(--text-muted);
    }

    .search-input {
        background: none;
        border: none;
        outline: none;
        color: var(--text-primary);
        font-size: 0.9rem;
        width: 200px;
        font-family: var(--font-family);
    }

    .search-input::placeholder {
        color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn-icon {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 8px;
        border-radius: var(--radius-sm);
        transition: var(--transition);
        display: flex;
        align-items: center;
    }

    .btn-icon:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
    }

    .btn-danger-icon:hover {
        color: var(--accent-danger);
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-md);
        font-family: var(--font-family);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        font-size: 0.9rem;
    }

    .btn-primary {
        background: var(--accent-primary);
        color: #fff;
    }

    .btn-primary:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
    }

    .btn-success {
        background: var(--accent-success);
        color: #fff;
    }

    .btn-success:hover {
        filter: brightness(1.1);
    }

    .btn-secondary {
        background: var(--bg-hover);
        color: var(--text-primary);
    }

    .btn-sm {
        padding: 6px 14px;
        font-size: 0.8rem;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-primary);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: var(--font-family);
        transition: var(--transition);
    }

    .btn-sm:hover {
        background: var(--bg-hover);
    }

    .btn-sm.btn-primary {
        background: var(--accent-primary);
        color: #fff;
        border-color: var(--accent-primary);
    }

    .btn:disabled,
    .btn-sm:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* ── View Container ── */
    .view-container {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
    }

    /* ── Status Badge ── */
    .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
    }

    /* ── Dashboard ── */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }

    .stat-card {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: var(--transition);
    }

    .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .stat-icon.accent-primary {
        background: var(--accent-primary-soft);
        color: var(--accent-primary);
    }

    .stat-icon.accent-success {
        background: var(--accent-success-soft);
        color: var(--accent-success);
    }

    .stat-icon.accent-warning {
        background: var(--accent-warning-soft);
        color: var(--accent-warning);
    }

    .stat-icon.accent-info {
        background: var(--accent-info-soft);
        color: var(--accent-info);
    }

    .stat-value {
        font-size: 1.6rem;
        font-weight: 800;
        display: block;
    }

    .stat-label {
        font-size: 0.82rem;
        color: var(--text-secondary);
    }

    .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 16px;
    }

    .chart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
    }

    .chart-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .bar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }

    .bar-label {
        width: 160px;
        font-size: 0.8rem;
        color: var(--text-secondary);
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .bar-track {
        flex: 1;
        height: 8px;
        background: var(--bg-surface);
        border-radius: 4px;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
        min-width: 4px;
    }

    .accent-bg-primary {
        background: var(--accent-primary);
    }

    .bar-value {
        font-size: 0.8rem;
        font-weight: 600;
        width: 32px;
        text-align: center;
    }

    /* ── Leads Table ── */
    .leads-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .leads-count {
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    .filter-select {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        font-family: var(--font-family);
        font-size: 0.85rem;
    }

    .leads-table-wrapper {
        overflow-x: auto;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
    }

    .leads-table {
        width: 100%;
        border-collapse: collapse;
    }

    .leads-table th {
        background: var(--bg-surface);
        padding: 12px 14px;
        text-align: left;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
    }

    .leads-table td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.88rem;
    }

    .lead-row {
        cursor: pointer;
        transition: var(--transition);
    }

    .lead-row:hover {
        background: var(--bg-hover);
    }

    .col-id {
        font-weight: 700;
        color: var(--accent-primary);
    }

    .col-name {
        font-weight: 600;
    }

    .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
    }

    .page-info {
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    /* ── Kanban Board ── */
    .pipeline-view {
        padding: 0 !important;
        height: calc(100vh - var(--topbar-h));
    }

    .kanban-board {
        display: flex;
        gap: 16px;
        padding: 20px;
        overflow-x: auto;
        height: 100%;
        align-items: flex-start;
    }

    .kanban-column {
        min-width: 280px;
        max-width: 300px;
        flex-shrink: 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - var(--topbar-h) - 56px);
    }

    .kanban-column-header {
        padding: 14px 16px;
        border-top: 3px solid var(--accent-primary);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .column-title {
        font-weight: 700;
        font-size: 0.9rem;
    }

    .column-count {
        background: var(--bg-surface);
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-secondary);
    }

    .kanban-cards {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        min-height: 80px;
    }

    .kanban-card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 14px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: var(--transition);
        backdrop-filter: blur(8px);
    }

    .kanban-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
        border-color: var(--border-hover);
    }

    .kanban-card.sortable-ghost {
        opacity: 0.4;
    }

    .kanban-card.sortable-chosen {
        box-shadow: var(--shadow-lg);
        transform: rotate(2deg);
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .card-id {
        font-size: 0.75rem;
        color: var(--accent-primary);
        font-weight: 700;
    }

    .card-calidad {
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--bg-hover);
        color: var(--text-muted);
    }

    .calidad-correcto {
        background: var(--accent-success-soft);
        color: var(--accent-success);
    }

    .calidad-spam {
        background: var(--accent-danger-soft);
        color: var(--accent-danger);
    }

    .calidad-duplicado {
        background: var(--accent-warning-soft);
        color: var(--accent-warning);
    }

    /* BANT score levels */
    .calidad-alto {
        background: rgba(34, 197, 94, 0.18);
        color: #22c55e;
        font-weight: 700;
    }

    .calidad-medio {
        background: rgba(99, 102, 241, 0.18);
        color: #818cf8;
        font-weight: 600;
    }

    .calidad-bajo {
        background: rgba(245, 158, 11, 0.18);
        color: #f59e0b;
    }

    .calidad-sin-calificar {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text-muted);
    }

    .card-name {
        font-size: 0.92rem;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .card-empresa {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }

    .card-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .card-vendedor {
        margin-left: auto;
        color: var(--accent-primary);
        font-weight: 500;
    }

    /* ── Modal ── */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg-modal);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        z-index: 1000;
        backdrop-filter: blur(4px);
        animation: fadeIn 0.2s ease;
    }

    .modal-panel {
        width: 600px;
        max-width: 90vw;
        height: 100vh;
        background: var(--bg-secondary);
        display: flex;
        flex-direction: column;
        animation: slideIn 0.3s ease;
        border-left: 1px solid var(--border);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
        }

        to {
            transform: translateX(0);
        }
    }

    .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
    }

    .modal-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .modal-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        gap: 4px;
    }

    .modal-tab {
        padding: 10px 16px;
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-family: var(--font-family);
        font-size: 0.88rem;
        border-bottom: 2px solid transparent;
        transition: var(--transition);
    }

    .modal-tab:hover {
        color: var(--text-primary);
    }

    .modal-tab.active {
        color: var(--accent-primary);
        border-bottom-color: var(--accent-primary);
        font-weight: 600;
    }

    .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 24px;
        border-top: 1px solid var(--border);
    }

    /* ── Forms ── */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .form-divider {
        grid-column: 1 / -1;
        border-top: 1px solid var(--border);
        margin: 6px 0;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .form-group label {
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .form-input,
    .form-select {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-family: var(--font-family);
        font-size: 0.88rem;
        transition: var(--transition);
    }

    .form-input:focus,
    .form-select:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft);
    }

    .notes-textarea {
        width: 100%;
        height: 300px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        border-radius: var(--radius-md);
        padding: 14px;
        font-family: var(--font-family);
        font-size: 0.9rem;
        resize: vertical;
    }

    .notes-textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
    }

    /* ── Timeline ── */
    .timeline {
        position: relative;
        padding-left: 24px;
    }

    .timeline::before {
        content: '';
        position: absolute;
        left: 8px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--border);
    }

    .timeline-item {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 16px;
        position: relative;
    }

    .timeline-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
        position: absolute;
        left: -24px;
        border: 2px solid var(--bg-secondary);
    }

    .dot-success {
        background: var(--accent-success);
    }

    .dot-danger {
        background: var(--accent-danger);
    }

    .timeline-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .timeline-type {
        font-size: 0.88rem;
        font-weight: 500;
    }

    .timeline-date {
        font-size: 0.78rem;
        color: var(--text-muted);
    }

    /* ── Pricing ── */
    .pricing-result {
        display: flex;
        gap: 16px;
        margin-top: 20px;
    }

    .pricing-card {
        flex: 1;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        text-align: center;
    }

    .pricing-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        display: block;
        margin-bottom: 6px;
    }

    .pricing-value {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--accent-success);
    }

    /* ── Calendar ── */
    .calendar-header-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .calendar-month-title {
        font-size: 1.1rem;
        font-weight: 700;
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
        background: var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }

    .cal-day-header {
        background: var(--bg-surface);
        padding: 10px;
        text-align: center;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-secondary);
    }

    .cal-day {
        background: var(--bg-card);
        padding: 8px;
        min-height: 80px;
        font-size: 0.85rem;
        position: relative;
    }

    .cal-day-empty {
        background: var(--bg-primary);
        opacity: 0.5;
    }

    .cal-day-today {
        background: var(--accent-primary-soft);
    }

    .cal-day-num {
        font-weight: 600;
        font-size: 0.82rem;
    }

    .cal-events {
        margin-top: 4px;
    }

    .cal-event-dot {
        font-size: 0.65rem;
        background: var(--accent-primary-soft);
        color: var(--accent-primary);
        padding: 1px 4px;
        border-radius: 3px;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .cal-more {
        font-size: 0.65rem;
        color: var(--text-muted);
    }

    /* ── Config ── */
    .config-view {
        max-width: 900px;
    }

    .config-categories {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }

    .config-category-btn {
        padding: 10px 18px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: var(--font-family);
        font-size: 0.88rem;
        font-weight: 500;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .config-category-btn:hover {
        background: var(--bg-hover);
        border-color: var(--border-hover);
        color: var(--text-primary);
    }

    .config-category-btn.active {
        background: linear-gradient(135deg, var(--accent-primary), #a78bfa);
        color: #fff;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 2px 12px rgba(108, 99, 255, 0.3);
    }

    .config-subcatalogs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
    }

    .config-tab {
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: var(--font-family);
        font-size: 0.82rem;
        transition: var(--transition);
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .config-tab:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
    }

    .config-tab.active {
        background: var(--accent-primary);
        color: #fff;
        border-color: var(--accent-primary);
        font-weight: 600;
    }

    .config-empty-cat {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
    }

    .config-editor {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px 24px;
    }

    .config-editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
    }

    .config-editor-header h3 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
    }

    .config-item-count {
        font-size: 0.78rem;
        color: var(--text-muted);
        background: var(--bg-surface);
        padding: 3px 10px;
        border-radius: 10px;
    }

    .config-values {
        max-height: 400px;
        overflow-y: auto;
        padding-right: 4px;
    }

    .config-value-row {
        display: flex;
        gap: 8px;
        margin-bottom: 6px;
        align-items: center;
    }

    .config-value-num {
        width: 24px;
        text-align: center;
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 600;
        flex-shrink: 0;
    }

    .config-input {
        flex: 1;
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-family: var(--font-family);
    }

    .config-input:focus {
        outline: none;
        border-color: var(--accent-primary);
    }

    .config-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        align-items: center;
        padding-top: 12px;
        border-top: 1px solid var(--border);
    }

    /* ── Account ── */
    .account-card {
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 40px;
    }

    .account-avatar-lg {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-primary), #a78bfa);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 1.8rem;
        margin: 0 auto 16px;
    }

    .account-settings {
        margin-top: 30px;
        text-align: left;
    }

    .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
    }

    .setting-label {
        font-weight: 600;
    }

    .theme-toggle-group {
        display: flex;
        gap: 6px;
    }

    /* ── Empty State ── */
    .empty-state {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
    }

    .empty-icon {
        font-size: 48px;
        display: block;
        margin-bottom: 10px;
        opacity: 0.4;
    }

    /* ── Toast ── */
    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 24px;
        border-radius: var(--radius-md);
        color: #fff;
        font-weight: 500;
        font-size: 0.9rem;
        z-index: 2000;
        animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    }

    .toast-success {
        background: var(--accent-success);
    }

    .toast-error {
        background: var(--accent-danger);
    }

    .toast-info {
        background: var(--accent-primary);
    }

    @keyframes toastIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
    }

    @keyframes toastOut {
        to {
            opacity: 0;
            transform: translateY(20px);
        }
    }

    /* ============================================
       REPORTES VIEW — Dense Analytics Dashboard
       ============================================ */

    /* ── Report Controls Bar (Sticky) ── */
    .report-controls-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 0;
        margin-bottom: 16px;
        position: sticky;
        top: 0;
        z-index: 20;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
    }

    .report-controls-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .report-controls-right {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .date-range-picker {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        font-family: var(--font-family);
        font-size: 0.88rem;
        min-width: 240px;
        cursor: pointer;
    }

    .date-range-picker:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-soft);
    }

    .comparison-label {
        font-size: 0.78rem;
        color: var(--text-muted);
        background: var(--bg-surface);
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        white-space: nowrap;
    }

    /* ── Loading Overlay ── */
    .report-loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg-modal);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(4px);
    }

    /* ── Error Card ── */
    .report-error-card {
        text-align: center;
        padding: 40px 24px;
        background: var(--accent-danger-soft);
        border: 1px solid var(--accent-danger);
        border-radius: var(--radius-lg);
        margin: 24px 0;
    }

    .report-error-card p {
        color: var(--text-primary);
        margin: 12px 0 16px;
        font-size: 0.92rem;
    }

    /* ── Empty & Initial States ── */
    .report-empty-state,
    .report-initial-state {
        text-align: center;
        padding: 60px 24px;
        color: var(--text-muted);
    }

    .report-empty-state p,
    .report-initial-state p {
        font-size: 0.92rem;
        max-width: 400px;
        margin: 0 auto;
    }

    /* ── Quick-Nav ── */
    .quick-nav {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        padding: 8px 0;
    }

    .quick-nav-btn {
        padding: 5px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: var(--font-family);
        font-size: 0.75rem;
        font-weight: 500;
        transition: var(--transition);
        white-space: nowrap;
    }

    .quick-nav-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
    }

    .quick-nav-btn.active {
        background: var(--accent-primary-soft);
        color: var(--accent-primary);
        border-color: var(--accent-primary);
    }

    /* ── Accordion Sections ── */
    .report-section {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 12px;
        overflow: hidden;
    }

    .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 18px;
        cursor: pointer;
        transition: var(--transition);
        user-select: none;
    }

    .section-header:hover {
        background: var(--bg-hover);
    }

    .section-chevron {
        font-size: 20px;
        color: var(--text-muted);
        transition: transform 0.2s ease;
    }

    .section-body {
        padding: 0 18px 18px;
    }

    /* ── Dense Report Tables ── */
    .report-table-wrapper {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
    }

    .report-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.8rem;
    }

    .report-table thead th {
        position: sticky;
        top: 0;
        background-color: var(--bg-surface);
        z-index: 10;
        padding: 8px 10px;
        border-bottom: 2px solid var(--border);
        font-weight: 600;
        text-align: center;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--text-secondary);
        white-space: nowrap;
    }

    .report-table thead th.col-group-header {
        text-align: center;
        border-bottom: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--accent-primary);
        font-weight: 700;
    }

    .report-table tbody td {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
    }

    .report-table tbody tr:hover {
        background: var(--bg-hover);
    }

    .report-table .col-metric {
        font-weight: 600;
        color: var(--text-primary);
        text-align: left;
        position: sticky;
        left: 0;
        background: var(--bg-card);
        z-index: 5;
        min-width: 160px;
    }

    .report-table tbody tr:hover .col-metric {
        background: var(--bg-hover);
    }

    .report-table .col-count {
        text-align: center;
        font-weight: 500;
        min-width: 60px;
    }

    /* ── Percentage Cell with Inline Bar ── */
    .col-percentage {
        position: relative;
        padding: 0 !important;
        min-width: 70px;
    }

    .percentage-cell {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
    }

    .percentage-bar {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        opacity: 0.15;
        transition: width 0.3s ease;
        border-radius: 0 2px 2px 0;
    }

    .percentage-value {
        position: relative;
        z-index: 1;
        font-weight: 500;
        font-size: 0.78rem;
    }

    /* ── Delta% Column ── */
    .col-delta {
        text-align: center;
        white-space: nowrap;
        min-width: 80px;
    }

    .delta-positive {
        color: var(--accent-success);
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-weight: 500;
        font-size: 0.78rem;
    }

    .delta-negative {
        color: var(--accent-danger);
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-weight: 500;
        font-size: 0.78rem;
    }

    .delta-neutral {
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-weight: 500;
        font-size: 0.78rem;
    }

    /* ── Delta Alert: |delta| >= 20% ── */
    .delta-alert {
        background-color: rgba(255, 193, 7, 0.18);
        border-radius: 4px;
        padding: 1px 4px;
        font-weight: 700;
    }

    .col-delta .material-symbols-outlined {
        font-size: 0.85rem;
    }

    /* ── Tooltip for Delta% Header ── */
    [data-tooltip] {
        position: relative;
        cursor: help;
    }

    [data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-card);
        color: var(--text-primary);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        font-size: 0.7rem;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        border: 1px solid var(--border);
        z-index: 20;
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
    }

    [data-tooltip]:hover::after {
        opacity: 1;
    }

    /* ── Semaforo Grid Matrix ── */
    .semaforo-grid .col-metric {
        min-width: 100px;
    }

    .semaforo-grid td {
        text-align: center;
    }

    /* ── Flatpickr Dark Theme Override ── */
    [data-theme="dark"] .flatpickr-calendar {
        background: var(--bg-card);
        border-color: var(--border);
        box-shadow: var(--shadow-lg);
    }

    [data-theme="dark"] .flatpickr-months .flatpickr-month,
    [data-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months,
    [data-theme="dark"] .flatpickr-weekdays,
    [data-theme="dark"] span.flatpickr-weekday {
        background: var(--bg-surface);
        color: var(--text-primary);
    }

    [data-theme="dark"] .flatpickr-day {
        color: var(--text-primary);
    }

    [data-theme="dark"] .flatpickr-day:hover {
        background: var(--bg-hover);
        border-color: var(--border-hover);
    }

    [data-theme="dark"] .flatpickr-day.selected,
    [data-theme="dark"] .flatpickr-day.startRange,
    [data-theme="dark"] .flatpickr-day.endRange {
        background: var(--accent-primary);
        border-color: var(--accent-primary);
