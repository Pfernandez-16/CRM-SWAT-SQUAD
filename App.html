    function expandLayout_(arr) {
        return arr.map(function (a, i) {
            return {
                campo_key: a[0], campo_label: a[1], tipo_input: a[2],
                seccion: a[3], seccion_icono: a[4],
                orden_seccion: a[5], orden_campo: i,
                visible: true, ancho: a[6] || 'half',
                solo_lectura: !!a[7], requerido: false,
                opciones_catalog: a[8] || '', rol_visible: a[9] || 'ALL'
            };
        });
    }

    // ── Phase 3B: Schema-driven helpers ──
    function prettifyColName_(col) {
        return col.replace(/^_[cq]_/, '').replace(/^_camp_/, '')
            .replace(/_/g, ' ')
            .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    function inferFieldType_(col, sheetFormat) {
        if (col.indexOf('id_') === 0) return 'hidden';
        // Use Google Sheets number format if available
        if (sheetFormat) {
            var fmt = String(sheetFormat).toLowerCase();
            if (fmt.indexOf('d') !== -1 && fmt.indexOf('m') !== -1) return 'date'; // date formats contain d and m
            if (fmt.indexOf('h') !== -1 && fmt.indexOf(':') !== -1) return 'time'; // time formats
            if (fmt.indexOf('#') !== -1 || fmt.indexOf('0.') !== -1 || fmt === '0' || fmt.indexOf('$') !== -1 || fmt.indexOf('%') !== -1) return 'number';
        }
        // Fallback: heuristic by column name
        if (col.indexOf('fecha') === 0 || col.indexOf('date') !== -1) return 'date';
        if (col.indexOf('hora') === 0 || col.indexOf('time') !== -1) return 'time';
        if (col.indexOf('monto') === 0 || col.indexOf('valor') === 0 || col.indexOf('precio') === 0 || col.indexOf('costo') === 0) return 'number';
        if (col.indexOf('nota') === 0 || col.indexOf('comentario') === 0 || col.indexOf('descripcion') === 0 || col.indexOf('observacion') === 0) return 'textarea';
        if (col.indexOf('es_') === 0) return 'select_yn';
        return 'text';
    }

    function autoFieldsFromSchema_(schema, knownLayout, entityType) {
        if (!schema || !schema.tables) return [];
        var knownKeys = {};
        for (var i = 0; i < knownLayout.length; i++) knownKeys[knownLayout[i].campo_key] = true;

        // Also build set of raw DB cols already covered by the known layout via fieldMap
        var mappedDbCols = {};
        if (schema.fieldMap) {
            for (var fk in schema.fieldMap) {
                mappedDbCols[schema.fieldMap[fk].dbCol] = true;
            }
        }

        var tablesToScan = entityType === 'lead'
            ? { fact_leads: '', dim_contactos: '_c_', fact_calificacion: '_q_', dim_campanas: '_camp_' }
            : { fact_deals: '', dim_contactos: '_c_', fact_calificacion: '_q_', dim_campanas: '_camp_' };

        var extras = [];
        for (var table in tablesToScan) {
            var prefix = tablesToScan[table];
            var cols = schema.tables[table] || [];
            var isReadOnly = (table === 'dim_campanas');

            for (var c = 0; c < cols.length; c++) {
                var rawCol = cols[c];
                if (SCHEMA_SYSTEM_COLS.indexOf(rawCol) !== -1) continue;
                if (mappedDbCols[rawCol]) continue;

                var frontendKey = prefix ? (prefix + rawCol) : rawCol;
                if (knownKeys[frontendKey]) continue;

                var colFormat = (schema.formats && schema.formats[table]) ? schema.formats[table][rawCol] : null;
                var tipo = inferFieldType_(rawCol, colFormat);
                if (tipo === 'hidden') continue;

                    campo_key: frontendKey,
                    campo_label: prettifyColName_(frontendKey),
                    tipo_input: tipo,
                    seccion: 'Otros Campos',

                    solo_lectura: isReadOnly,
                    requerido: false,
                    opciones_catalog: '',
                    rol_visible: 'ALL',
                    _isAutoGenerated: true
                });
            }
        }
        return extras;
    }

            function initFullCalendar() {
                const el = document.getElementById('fullcalendar-container');
                if (!el) return;

                if (fullCalendarInstance) {
                    fullCalendarInstance.destroy(); // Destruye la instancia previa atada al DOM antiguo
                }

                fullCalendarInstance = new FullCalendar.Calendar(el, {
                    initialView: 'dayGridMonth',
                    locale: 'es',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,listWeek'
                    },
                    buttonText: {
                        today: 'Hoy', month: 'Mes', week: 'Semana', list: 'Lista'
                    },
                    height: 'auto',
                    selectable: true,
                    selectMirror: true,
                    // Click o drag sobre fechas vacías → abre Quick Calendar
                    select: function (info) {
                        var startDate = info.startStr.split('T')[0];
                        var startTime = info.startStr.includes('T') ? info.startStr.split('T')[1].substring(0, 5) : '';
                        openQuickCalendar('Agendado desde Calendario', startDate, startTime);
                        fullCalendarInstance.unselect();
                    },
                    // Click sobre evento existente → abre modal de detalles
                    eventClick: function (info) {
                        var ev = info.event;
                        selectedEventData.id = ev.extendedProps && ev.extendedProps.id ? ev.extendedProps.id : (ev.id || '');
                        selectedEventData.title = ev.title;
                        selectedEventData.start = ev.startStr;
                        selectedEventData.end = ev.endStr;

                        // Convertir ISO a datetime-local (YYYY-MM-DDTHH:MM)
                        function isoToLocal(isoStr) {
                            if (!isoStr) return '';
                            var d = new Date(isoStr);
                            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
                            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                                'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
                        }
                        selectedEventData.startLocal = isoToLocal(ev.startStr);
                        selectedEventData.endLocal = isoToLocal(ev.endStr);

                        // Tipo basado en hack de colores
                        var color = ev.backgroundColor;
                        if (color === '#e67c73') selectedEventData.type = 'Tarea';
                        else if (color === '#dc2127') selectedEventData.type = 'Recordatorio';
                        else if (color === '#616161') selectedEventData.type = 'Registro Visual';
                        else selectedEventData.type = 'Evento';

                        // Campos extendidos del backend
                        var props = ev.extendedProps || {};
                        selectedEventData.description = props.description || '';
                        selectedEventData.notificationMinutes = props.notificationMinutes || 30;
                        selectedEventData.visibility = props.visibility || 'DEFAULT';

                        showEventDetails.value = true;
                    },
                    events: function (info, successCallback, failureCallback) {
                        google.script.run
                            .withSuccessHandler(function (json) {
                                try {
                                    var parsed = JSON.parse(json);
                                    if (parsed.status === 'success') {
                                        successCallback(parsed.data);
                                    } else {
                                        failureCallback(parsed.message);
                                    }
                                } catch (e) {
                                    failureCallback('Error parsing events');
                                }
                            })
                            .withFailureHandler(function (err) {
                                failureCallback(err.message || 'Error fetching events');
                            })
                            .getAgentEvents(info.startStr, info.endStr);
                    }
                });
                fullCalendarInstance.render();
            }

            // ── Report Functions ──
            function formatDateYMD(date) {
                if (!date) return '';
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return year + '-' + month + '-' + day;
            }

            let reportAbortController = null;

            function generateReport() {
                if (!dateRange.value.start || !dateRange.value.end) return;
                reportLoading.value = true;
                reportError.value = null;
                reportAbortController = new AbortController();

                const dateIn = formatDateYMD(dateRange.value.start);
                const dateOut = formatDateYMD(dateRange.value.end);

                google.script.run
                    .withSuccessHandler(function (jsonString) {
                        if (reportAbortController && reportAbortController.signal.aborted) return;
                        try {
                            const data = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
                            if (data.error) {
                                reportError.value = data.error;
                                reportData.value = null;
                            } else if (data.metadata && data.metadata.totalLeads === 0) {
                                reportData.value = { _empty: true };
                            } else {
                                reportData.value = data;
                                if (data.metadata && data.metadata.previousDateIn && data.metadata.previousDateOut) {
                                    comparisonRange.value = {
                                        start: new Date(data.metadata.previousDateIn),
                                        end: new Date(data.metadata.previousDateOut)
                                    };
                                }
                            }
                        } catch (e) {
                            reportError.value = 'Error al procesar la respuesta: ' + e.message;
                            reportData.value = null;
                        }
                        reportLoading.value = false;
                    })
                    .withFailureHandler(function (error) {
                        if (reportAbortController && reportAbortController.signal.aborted) return;
                        reportError.value = error.message || 'Error desconocido al generar el reporte';
                        reportData.value = null;
                        reportLoading.value = false;
                    })
                    .getSDRReport(
                        dateIn,
                        dateOut,
                        compareType.value,
                        compareType.value === 'custom' ? formatDateYMD(customPrevRange.value.start) : null,
                        compareType.value === 'custom' ? formatDateYMD(customPrevRange.value.end)   : null

            function loadDealProducts(idDeal) {
                dealProductLines.value = [];

                google.script.run
                    .withSuccessHandler(function (lines) {
                        dealProductLines.value = (lines || []).map(function (l) {
                            return {
                                nombre_producto: l.nombre_producto || '',
                                cantidad: l.cantidad || 1,
                                precio_unitario: l.precio_unitario || 0,
                                descuento_pct: l.descuento_pct || 0
                            };
                        });
                    })
                    .withFailureHandler(function () { dealProductLines.value = []; })

            function addProductLine() {
                dealProductLines.value.push({ nombre_producto: '', cantidad: 1, precio_unitario: 0, descuento_pct: 0 });
            }

            function removeProductLine(idx) {
                dealProductLines.value.splice(idx, 1);
            }

            function productLineSubtotal(line) {
                var qty = Number(line.cantidad) || 1;
                var price = Number(line.precio_unitario) || 0;
                var disc = Number(line.descuento_pct) || 0;
                return Math.round(qty * price * (1 - disc / 100) * 100) / 100;
            }

            function productLinesTotal() {
                var total = 0;
                for (var i = 0; i < dealProductLines.value.length; i++) {
                    total += productLineSubtotal(dealProductLines.value[i]);
                }
                return total;
            }

            function saveLeadChanges() {
                saving.value = true;
                const row = selectedLead.value._row;
                const updates = {};

                // ── Intercept: If SDR changes Status to "Paso a Ventas" via dropdown, redirect to Handoff Modal ──
                const isLead = selectedLead.value._source !== 'deal' && selectedLead.value._source !== 'cross_deal';
                const oldStatus = String(selectedLead.value['Status'] || '').trim().toLowerCase();
                const newStatus = String(editLead['Status'] || '').trim().toLowerCase();
                if (isLead && newStatus === 'paso a ventas' && oldStatus !== 'paso a ventas') {
                    saving.value = false;
                    closeLeadModal();
                    openHandoffModal(selectedLead.value);
                    return;
                }

                // Phase 3B: Dynamic EDITABLE_KEYS derived from layout + schema
                var _isDealSrc = selectedLead.value._source === 'deal' || selectedLead.value._source === 'cross_deal';
                var _baseLayout = _isDealSrc
                    ? (fieldLayoutDeal.value.length > 0 ? fieldLayoutDeal.value : DEFAULT_DEAL_LAYOUT)
                    : (fieldLayoutLead.value.length > 0 ? fieldLayoutLead.value : DEFAULT_LEAD_LAYOUT);
                var _autoFields = autoFieldsFromSchema_(schemaData.value, _baseLayout, _isDealSrc ? 'deal' : 'lead');
                var _fullLayout = _baseLayout.concat(_autoFields);
                const EDITABLE_KEYS = _fullLayout
                    .filter(function (f) { return f.visible && !f.solo_lectura && f.tipo_input !== 'hidden'; })
                    .map(function (f) { return f.campo_key; })
                    // Also include special pseudo-keys that are always needed
                    .concat(['Modo Presupuesto', 'Presupuesto Rango Alto', 'Razón Pérdida Otra']);

                // Phase 8: Monto Aproximado is now computed from global pricing config (no per-lead injection)

                // Phase 10 (DEAL-02): Auto-timestamp fecha_cotizacion when monto cotización is set
                if (selectedLead.value._source === 'deal' || selectedLead.value._source === 'cross_deal') {
                    var hasMontoCot = parseFloat(editLead['Monto de Cotización']) > 0;
                    var hadMontoCot = parseFloat(selectedLead.value['Monto de Cotización']) > 0;
                    if (hasMontoCot && !hadMontoCot && !editLead['Fecha de Cotización']) {
                        editLead['Fecha de Cotización'] = new Date().toISOString().slice(0, 10);
                    }
                    // Auto-timestamp fecha_cierre when status changes to "Vendido"
                    var ventaNewStatus = String(editLead['Status de Venta'] || '').trim();
                    var ventaOldStatus = String(selectedLead.value['Status de Venta'] || '').trim();
                    if (ventaNewStatus === 'Vendido' && ventaOldStatus !== 'Vendido' && !editLead['Fecha de Cierre']) {
                        editLead['Fecha de Cierre'] = new Date().toISOString().slice(0, 10);
                    }
                }

                for (const key of EDITABLE_KEYS) {
                    const oldVal = String(selectedLead.value[key] ?? '');
                    const newVal = String(editLead[key] ?? '');
                    if (oldVal !== newVal) {
                        updates[key] = editLead[key];
                    }
                }

                if (Object.keys(updates).length === 0) {
                    saving.value = false;
                    showToast('No hay cambios para guardar.', 'info');
                    return;
                }

                google.script.run
                    .withSuccessHandler(function (result) {
                        saving.value = false;
                        // Phase 1.8: Surface real backend errors (triggerError) instead of phantom status check
                        if (result && result.triggerError) {
                            showToast('❌ Error del servidor: ' + result.triggerError, 'error');
                            console.error('[SAVE] Backend triggerError:', result.triggerError);
                            return;
                        }
                        if (result && result.updated === false) {
                            showToast('⚠️ No se actualizó ninguna columna. Verifica los headers en Google Sheets.', 'error');
                            console.warn('[SAVE] Backend returned updated=false. Full result:', JSON.stringify(result));
                            return;
                        }
                        showToast('✅ Registro actualizado correctamente', 'success');
                        // Update local data using correct dataset
                        const isDealSource = (selectedLead.value._source === 'deal' || selectedLead.value._source === 'cross_deal');
                        const dataset = isDealSource ? deals : leads;
                        const idx = dataset.value.findIndex(l => l._row === row);
                        if (idx >= 0) {
                            for (const key of EDITABLE_KEYS) {
                                if (updates.hasOwnProperty(key)) {
                                    dataset.value[idx][key] = editLead[key];
                                }
                            }
                            // If backend recalculated BANT score, sync it into the lead
                            if (result && result.calidadContacto) {
                                editLead['Calidad de Contacto'] = result.calidadContacto;
                                dataset.value[idx]['Calidad de Contacto'] = result.calidadContacto;
                            }
                            // Rebuild UI convenience aliases
                            dataset.value[idx]._colW_Status = dataset.value[idx]['Status'] || '';
                            dataset.value[idx]._colX_Calidad = dataset.value[idx]['Calidad de Contacto'] || '';
                            dataset.value[idx]._colY_Toques = dataset.value[idx]['Toques de Contactación'] || '';
                            dataset.value[idx]._colAQ_Vendedor = dataset.value[idx]['Vendedor Asignado para Seguimiento'] || '';
                            dataset.value[idx]._colAS_Notas = dataset.value[idx]['Notas'] || '';
                            dataset.value[idx]._name = ((dataset.value[idx]['Nombre'] || '') + ' ' + (dataset.value[idx]['Apellido'] || '')).trim();
                            dataset.value[idx]._empresa = dataset.value[idx]['empresa'] || '';
                            dataset.value[idx]._email = dataset.value[idx]['Email'] || '';
                            dataset.value[idx]._tel = dataset.value[idx]['Teléfono'] || '';
                        }
                        closeLeadModal();
                        loadStats();
                    })
                    .withFailureHandler(function (err) {
                        saving.value = false;
                        showToast('❌ Error al guardar: ' + err.message, 'error');
                    })
                    .updateLeadMultiple(row, updates, selectedLead.value._source === 'deal' || selectedLead.value._source === 'cross_deal');

                        day: '2-digit', month: 'short', year: 'numeric',

                    });

            // ── Data Loading ──
            function loadLeads() {
                return new Promise((resolve) => {
                    google.script.run
                        .withSuccessHandler(function (response) {
                            try {
                                if (typeof response === 'string') {
                                    response = JSON.parse(response || '{}');
                                }
                                // New format: { leads: [...], deals: [...] }
                                if (response.leads !== undefined) {
                                    leads.value = response.leads || [];
                                    deals.value = response.deals || [];
                                    vendedoresList.value = response.vendedores || [];
                                }
                                // Legacy wrapped format: { status, data: { leads, deals } }
                                else if (response.data && response.data.leads) {
                                    leads.value = response.data.leads || [];
                                    deals.value = response.data.deals || [];
                                }
                                // Oldest fallback: raw array
                                else if (Array.isArray(response)) {
                                    leads.value = response;
                                    deals.value = [];
                                } else if (Array.isArray(response.data)) {
                                    leads.value = response.data;
                                    deals.value = [];
                                }
                                // GLOBAL _source injection (ensures read-only flag works from ANY view)
                                leads.value.forEach(function (l) { l._source = 'lead'; });
                                deals.value.forEach(function (d) { d._source = 'deal'; });
                                if (response.error) {
                                    console.error('[API] getLeads error:', response.error);
                                }
                            } catch (e) {
                                console.error('[DEBUG] Parsing error:', e);
                            }
                            console.log('[DEBUG] Loaded:', leads.value.length, 'leads,', deals.value.length, 'deals.');
                            resolve();
                        })
                        .withFailureHandler(function (err) {
                            console.error('[DEBUG] getLeads FAILED:', err);
                            showToast('Error cargando datos: ' + err.message, 'error');
                            resolve();
                        })
                        .getLeads();
                });
            }

                            } else if (response && response.status === 'error') {

            // ── Session Management ──
            function getSession() {
                try {
                    var raw = localStorage.getItem(SESSION_KEY);
                    if (!raw) return null;
                    var session = JSON.parse(raw);
                    if (!session || !session.email || !session.ts) return null;
                    if (Date.now() - session.ts > SESSION_TTL_MS) {
                        localStorage.removeItem(SESSION_KEY);
                        return null;
                    }
                    return session;
                } catch (e) { return null; }
            }

            function saveSession(email) {
                localStorage.setItem(SESSION_KEY, JSON.stringify({ email: email, ts: Date.now() }));
            }

            function clearSession() {
                localStorage.removeItem(SESSION_KEY);
            }

            function handleLogin() {
                if (!loginEmail.value.trim() || !loginPassword.value.trim()) {
                    loginError.value = 'Ingresa email y contraseña';
                    return;
                }
                loginError.value = '';
                loginLoading.value = true;
                google.script.run
                    .withSuccessHandler(function (result) {
                        loginLoading.value = false;
                        if (result && result.status === 'success') {
                            saveSession(result.data.email);
                            currentUser.value = result.data;
                            userConnected.value = result.data.isConnected;
                            if (result.data.isConnected && result.data.clockInTime) {
                                clockInTime.value = new Date(result.data.clockInTime);
                                startClockTimer_();
                            }
                            isLoggedIn.value = true;
                            loginEmail.value = '';
                            loginPassword.value = '';
                            initAfterLogin();
                        } else {
                            loginError.value = (result && result.message) || 'Error de autenticación';
                        }
                    })
                    .withFailureHandler(function (err) {
                        loginLoading.value = false;
                        loginError.value = 'Error de conexión: ' + err.message;
                    })
                    .loginUser(loginEmail.value.trim(), loginPassword.value.trim());
            }

            function handleLogout() {
                clearSession();
                isLoggedIn.value = false;
                currentUser.value = { email: '', nombre: '', rol: 'GUEST', sheetId: '' };
                loading.value = true;
                // Reset clock state
                if (userConnected.value) {
                    google.script.run.clockOut();
                }
                userConnected.value = false;
                clockInTime.value = null;
                clockTimer.value = '';
                if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
                if (inactivityTimeout) { clearTimeout(inactivityTimeout); inactivityTimeout = null; }
            }

            function loadUser() {
                return new Promise((resolve) => {
                    var session = getSession();
                    if (session && session.email) {
                        google.script.run
                            .withSuccessHandler(function (data) {
                                if (data && data.inactive) {
                                    clearSession();
                                    isLoggedIn.value = false;
                                    resolve();
                                    return;
                                }
                                currentUser.value = data || { email: 'Unknown', nombre: 'Unknown', rol: 'GUEST' };
                                userConnected.value = data && data.isConnected;
                                if (data && data.isConnected && data.clockInTime) {
                                    clockInTime.value = new Date(data.clockInTime);
                                    startClockTimer_();
                                }
                                isLoggedIn.value = true;
                                resolve();
                            })
                            .withFailureHandler(function (err) {
                                console.error('Error loading user config:', err);
                                resolve();
                            })
                            .getUserConfigByEmail(session.email);
                    } else {
                        resolve();

                });

            // ── Clock-In / Clock-Out ──
            function handleClockIn() {
                google.script.run
                    .withSuccessHandler(function (result) {
                        if (result && result.status === 'success') {
                            userConnected.value = true;
                            clockInTime.value = new Date();
                            startClockTimer_();
                            showToast('🟢 Conectado — ¡a trabajar!', 'success');
                            resetInactivityTimer_();
                        } else {
                            showToast('Error al conectarse: ' + (result && result.message), 'error');
                        }
                    })
                    .withFailureHandler(function (err) {
                        showToast('Error: ' + err.message, 'error');
                    })
                    .clockIn();
            }

            function handleClockOut() {
                google.script.run
                    .withSuccessHandler(function (result) {
                        if (result && result.status === 'success') {
                            userConnected.value = false;
                            clockInTime.value = null;
                            clockTimer.value = '';
                            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
                            if (inactivityTimeout) { clearTimeout(inactivityTimeout); inactivityTimeout = null; }
                            showToast('🔴 Desconectado', 'info');
                        }
                    })
                    .withFailureHandler(function (err) {
                        showToast('Error: ' + err.message, 'error');
                    })
                    .clockOut();
            }

            function startClockTimer_() {
                if (clockInterval) clearInterval(clockInterval);
                clockInterval = setInterval(() => {
                    if (!clockInTime.value) return;
                    const diff = Date.now() - new Date(clockInTime.value).getTime();
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    clockTimer.value = h + 'h ' + String(m).padStart(2, '0') + 'm';
                }, 10000); // Update every 10 sec
            }

            // ── Inactivity Auto-Disconnect ──
            function resetInactivityTimer_() {
                if (inactivityTimeout) clearTimeout(inactivityTimeout);
                if (!userConnected.value) return;
                inactivityTimeout = setTimeout(() => {
                    if (userConnected.value) {
                        handleClockOut();
                        showToast('⏰ Desconectado por inactividad (30 min)', 'info');
                    }
                }, INACTIVITY_LIMIT_MS);

            function startEditFieldLayout(tipo) {
                fieldLayoutEditType.value = tipo;
                var layout = tipo === 'lead'
                    ? (fieldLayoutLead.value.length > 0 ? fieldLayoutLead.value : DEFAULT_LEAD_LAYOUT)
                    : (fieldLayoutDeal.value.length > 0 ? fieldLayoutDeal.value : DEFAULT_DEAL_LAYOUT);
                // Phase 3B: Merge auto-generated fields from schema
                var autoFields = autoFieldsFromSchema_(schemaData.value, layout, tipo);
                var merged = layout.concat(autoFields);
                // Deep clone for editing
                fieldLayoutEditFields.value = JSON.parse(JSON.stringify(merged));
            }

            function moveFieldUp(sectionFields, idx) {
                if (idx <= 0) return;
                var temp = sectionFields[idx].orden_campo;
                sectionFields[idx].orden_campo = sectionFields[idx - 1].orden_campo;
                sectionFields[idx - 1].orden_campo = temp;
                // Re-number entire edit array
                reorderEditFields_();
            }

            function moveFieldDown(sectionFields, idx) {
                if (idx >= sectionFields.length - 1) return;
                var temp = sectionFields[idx].orden_campo;
                sectionFields[idx].orden_campo = sectionFields[idx + 1].orden_campo;
                sectionFields[idx + 1].orden_campo = temp;
                reorderEditFields_();
            }

            function reorderEditFields_() {
                // Re-assign orden_campo sequentially within each section
                var bySection = {};
                fieldLayoutEditFields.value.forEach(function (f) {
                    var key = f.seccion || '';
                    if (!bySection[key]) bySection[key] = [];
                    bySection[key].push(f);
                });
                Object.values(bySection).forEach(function (fields) {
                    fields.sort(function (a, b) { return a.orden_campo - b.orden_campo; });
                    fields.forEach(function (f, i) { f.orden_campo = i; });
                });
            }

            // Phase 3B: Section CRUD state
            const newSectionName = ref('');
            const newSectionIcon = ref('📋');

            function createNewSection() {
                var name = (newSectionName.value || '').trim();
                if (!name) { showToast('Ingresa un nombre para la sección', 'error'); return; }
                // Check if section already exists
                var exists = fieldLayoutEditFields.value.some(function (f) { return f.seccion === name; });
                if (exists) { showToast('Ya existe una sección con ese nombre', 'error'); return; }
                var maxOrden = 0;
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.orden_seccion > maxOrden) maxOrden = f.orden_seccion;
                });
                // Add a placeholder field so the section is visible (will be removed when real fields move in)
                fieldLayoutEditFields.value.push({
                    campo_key: '_placeholder_' + name, campo_label: '(Mueve campos aquí)', tipo_input: 'hidden',
                    seccion: name, seccion_icono: newSectionIcon.value || '📋',
                    orden_seccion: maxOrden + 1, orden_campo: 0,
                    visible: false, ancho: 'half', solo_lectura: true, requerido: false,
                    opciones_catalog: '', rol_visible: 'ALL'
                });
                showToast('Sección "' + name + '" creada', 'success');
                newSectionName.value = '';
                newSectionIcon.value = '📋';
            }

            function renameSection(section) {
                var newName = prompt('Nuevo nombre para la sección "' + section.name + '":', section.name);
                if (!newName || newName.trim() === section.name) return;
                newName = newName.trim();
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.seccion === section.name) f.seccion = newName;
                });
            }

            function deleteSection(section) {
                if (section.fields.some(function (f) {
                    return ['toque_counter', 'ae_toque_counter', 'products_table', 'calidad_badge'].indexOf(f.tipo_input) !== -1;
                })) {
                    showToast('No se puede eliminar: contiene campos especiales', 'error');
                    return;
                }
                // Move all fields to "Otros Campos"
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.seccion === section.name) {
                        f.seccion = 'Otros Campos';
                        f.seccion_icono = '📋';

                    }
                });
                showToast('Sección eliminada. Campos movidos a "Otros Campos".', 'info');
            }

            function moveSectionUp(sIdx) {
                var sections = editLayoutSections.value;
                if (sIdx <= 0 || sIdx >= sections.length) return;
                var thisSection = sections[sIdx];
                var prevSection = sections[sIdx - 1];
                // Swap orden_seccion values
                var thisOrden = thisSection.orden;
                var prevOrden = prevSection.orden;
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.seccion === thisSection.name) f.orden_seccion = prevOrden;
                    else if (f.seccion === prevSection.name) f.orden_seccion = thisOrden;
                });
            }

            function moveSectionDown(sIdx) {
                var sections = editLayoutSections.value;
                if (sIdx < 0 || sIdx >= sections.length - 1) return;
                var thisSection = sections[sIdx];
                var nextSection = sections[sIdx + 1];
                var thisOrden = thisSection.orden;
                var nextOrden = nextSection.orden;
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.seccion === thisSection.name) f.orden_seccion = nextOrden;
                    else if (f.seccion === nextSection.name) f.orden_seccion = thisOrden;
                });
            }

            function changeFieldSection(field, newSection) {
                field.seccion = newSection;
                // Find the max orden_seccion for the new section
                var targetOrden = 0;
                fieldLayoutEditFields.value.forEach(function (f) {
                    if (f.seccion === newSection && f.orden_seccion > targetOrden) targetOrden = f.orden_seccion;
                });
                field.orden_seccion = targetOrden || field.orden_seccion;
                field.orden_campo = 999; // Place at end of new section

            // ── Kanban Drag & Drop with SortableJS ──
            function initKanbanDragDrop() {
                if (viewMode.value !== 'kanban') return;

                nextTick(() => {
                    const columns = document.querySelectorAll('.kanban-cards');
                    columns.forEach(col => {
                        if (col._sortable) col._sortable.destroy();

                        col._sortable = new Sortable(col, {
                            group: 'kanban',
                            animation: 300,
                            ghostClass: 'sortable-ghost',
                            chosenClass: 'sortable-chosen',
                            dragClass: 'sortable-drag',
                            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                            onEnd: function (evt) {
                                const cardEl = evt.item;
                                const newCol = evt.to;
                                const rowNum = parseInt(cardEl.dataset.row, 10);
                                const newStatus = newCol.dataset.status;
                                const cardSource = cardEl.dataset.source || '';

                                if (!rowNum || !newStatus) return;

                                // Determine if this item is a deal or lead
                                const itemIsDeal = cardSource === 'deal';
                                const dataset = itemIsDeal ? deals : leads;
                                const lead = dataset.value.find(l => l._row === rowNum);

                                if (lead) {
                                    const oldStatus = itemIsDeal ? lead['Status de Venta'] : lead._colW_Status;
                                    if (oldStatus === newStatus) return;

                                    // ── HANDOFF: Intercept "Paso a Ventas" with modal instead of confirm() ──
                                    if (!itemIsDeal && newStatus.toLowerCase().trim() === 'paso a ventas') {
                                        openHandoffModal(lead);
                                        // Revert visually for now; the actual move happens after handoff form
                                        nextTick(() => initKanbanDragDrop());
                                        return;
                                    }

                                    // Update locally
                                    if (itemIsDeal) {
                                        lead['Status de Venta'] = newStatus;
                                    } else {
                                        lead._colW_Status = newStatus;
                                        lead['Status'] = newStatus;
                                    }

                                    // Persist status change to backend
                                    google.script.run
                                        .withSuccessHandler(function (result) {
                                            if (result && result.triggerError) {
                                                if (itemIsDeal) {
                                                    lead['Status de Venta'] = oldStatus;
                                                } else {
                                                    lead._colW_Status = oldStatus;
                                                    lead['Status'] = oldStatus;
                                                }
                                                showToast('Error al mover: ' + result.triggerError, 'error');
                                            } else {
                                                const labelPrefix = itemIsDeal ? 'Deal #' : 'Lead #';
                                                showToast(labelPrefix + (lead._id || rowNum) + ' → ' + newStatus, 'success');
                                                loadStats();
                                            }
                                        })
                                        .withFailureHandler(function (err) {
                                            if (itemIsDeal) {
                                                lead['Status de Venta'] = oldStatus;
                                            } else {
                                                lead._colW_Status = oldStatus;
                                                lead['Status'] = oldStatus;
                                            }
                                            showToast('Error al mover: ' + err.message, 'error');
                                        })
                                        .updateLeadField(rowNum, itemIsDeal ? 'Status de Venta' : 'Status', newStatus, itemIsDeal);
                                }
                            }
                        });
                    });
                });
            }

            // ── Phase 9: Pricing calculator for handoff modal ──
            const handoffMontoEstimado = computed(function () {
                var lead = handoffLead.value;
                if (!lead || !lead['Tipo de Cliente']) return null;
                var tipo = String(lead['Tipo de Cliente'] || '').trim();
                var ticket = parseFloat(lead['Ticket Promedio']) || 0;
                var licencias = parseFloat(lead['Licencias Promedio']) || 0;
                if (!tipo || ticket === 0) return null;
                var monto = 0;
                var formula = '';
                if (tipo === 'Fichas Mensuales (FEE)') {
                    monto = ticket * 12;
                    formula = '$' + ticket.toLocaleString() + ' × 12 meses';
                } else if (tipo === 'Proyectos') {
                    monto = ticket;
                    formula = '$' + ticket.toLocaleString() + ' (proyecto único)';
                } else if (tipo === 'SaaS') {
                    monto = ticket * licencias * 12;
                    formula = '$' + ticket.toLocaleString() + ' × ' + licencias + ' licencias × 12 meses';
                }
                if (monto === 0) return null;
                return { monto: monto, formula: formula, tipo: tipo };
            });

            function handleAttachmentSelect(event) {

            function sendEmail() {
                // Get HTML content from Quill
                var htmlBody = '';
                var plainText = '';
                if (quillInstance) {
                    htmlBody = quillInstance.root.innerHTML || '';
                    plainText = quillInstance.getText() || '';
                }

                if (!emailForm.to || !emailForm.subject || (!htmlBody && !plainText)) {
                    showToast('Todos los campos son obligatorios (Para, Asunto, Cuerpo).', 'error');
                    return;
                }

                if (emailAttachmentSizeMB.value > 20) {
                    showToast('⚠️ Los adjuntos exceden el límite de 20 MB.', 'error');
                    return;
                }

                sendingEmail.value = true;

                // Process attachments to Base64
                var filesToProcess = emailAttachments.value.slice();
                var processedAttachments = [];
                var filesProcessed = 0;

                function doSend() {
                    google.script.run
                        .withSuccessHandler(function (result) {
                            sendingEmail.value = false;
                            if (result && result.status === 'success') {
                                showToast('✅ ' + result.message, 'success');
                                closeEmailCompose();
                            } else {
                                showToast('❌ ' + (result.message || 'Error desconocido'), 'error');
                            }
                        })
                        .withFailureHandler(function (err) {
                            sendingEmail.value = false;
                            showToast('❌ Error al enviar correo: ' + err.message, 'error');
                        })
                        .sendDirectEmail(
                            emailForm.to,
                            emailForm.subject,
                            plainText,
                            emailForm.entityId,
                            emailForm.entityType,
                            htmlBody,
                            processedAttachments
                        );
                }

                if (filesToProcess.length === 0) {
                    doSend();
                } else {
                    // Read all files as Base64 before sending
                    for (var i = 0; i < filesToProcess.length; i++) {
                        (function (file) {
                            var rawFile = typeof Vue !== 'undefined' && Vue.toRaw ? Vue.toRaw(file) : file;
                            var reader = new FileReader();
                            reader.onload = function (e) {
                                var base64 = e.target.result.split(',')[1]; // strip data:...;base64,
                                processedAttachments.push({
                                    filename: rawFile.name,
                                    mimeType: rawFile.type || 'application/octet-stream',
                                    data: base64
                                });
                                filesProcessed++;
                                if (filesProcessed === filesToProcess.length) {
                                    doSend();
                                }
                            };
                            reader.onerror = function () {
                                sendingEmail.value = false;
                                showToast('❌ Error al leer archivo: ' + rawFile.name, 'error');
                            };
                            reader.readAsDataURL(rawFile);
                        })(filesToProcess[i]);
                    }
                }
            }

                if (newView === 'config' && userRole.value === 'ADMIN') {
                    loadHMN();
                    loadAllUsers();
                }
                if (newView === 'reportes') {
                    nextTick(() => {
                        const now = new Date();
                        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);

                        if (flatpickrInstance) { flatpickrInstance.destroy(); flatpickrInstance = null; }

                        flatpickrInstance = flatpickr('.date-range-picker', {
                            mode: 'range',
                            dateFormat: 'Y-m-d',
                            defaultDate: [firstDay, lastDay],
                            locale: { firstDayOfWeek: 1, rangeSeparator: ' a ' },
                            onChange: function (selectedDates) {
                                if (selectedDates.length === 2) {
                                    dateRange.value = { start: selectedDates[0], end: selectedDates[1] };
                                    const diffMs = selectedDates[1].getTime() - selectedDates[0].getTime();
                                    const compEnd = new Date(selectedDates[0].getTime() - 86400000);
                                    const compStart = new Date(compEnd.getTime() - diffMs);
                                    comparisonRange.value = { start: compStart, end: compEnd };
                                }
                            }
                        });

                        // Set initial date range
                        dateRange.value = { start: firstDay, end: lastDay };
                        const diffMs = lastDay.getTime() - firstDay.getTime();
                        const compEnd = new Date(firstDay.getTime() - 86400000);
                        const compStart = new Date(compEnd.getTime() - diffMs);
                        comparisonRange.value = { start: compStart, end: compEnd };

                        // Auto-load current month report
                        generateReport();
                    });
                }
                if (oldView === 'reportes' && flatpickrInstance) {
                    flatpickrInstance.destroy();
                    flatpickrInstance = null;
                }
            });

            watch(viewMode, (newMode) => {
                if (newMode === 'kanban') {
                    nextTick(() => initKanbanDragDrop());
                }
            });

            // Auto-trigger report when compareType changes (PERIOD-03)
            watch(compareType, function (newType) {
                if (newType === 'custom') {
                    nextTick(function () {
                        if (customPrevFlatpickrInstance) {
                            customPrevFlatpickrInstance.destroy();
                            customPrevFlatpickrInstance = null;
                        }
                        customPrevFlatpickrInstance = flatpickr('.custom-prev-picker', {
                            mode: 'range',
                            dateFormat: 'Y-m-d',
                            locale: { firstDayOfWeek: 1, rangeSeparator: ' a ' },
                            onChange: function (selectedDates) {
                                if (selectedDates.length === 2) {
                                    customPrevRange.value = { start: selectedDates[0], end: selectedDates[1] };
                                }
                            }
                        });
                    });
                } else {
                    if (customPrevFlatpickrInstance) {
                        customPrevFlatpickrInstance.destroy();
                        customPrevFlatpickrInstance = null;
                    }
                    generateReport();
                }
            });

            // ── Post-login data load ──
            async function initAfterLogin() {
                loading.value = true;
                await Promise.all([loadLeads(), loadCatalogs(), loadPricing()]);
                loadStats();
                loadActiveAEs();
                loadRoutingConfig();
                loadSchema();
                loadPricingConfig();
                loadFieldLayout();
                loadPlantillas();
                loading.value = false;

                ['click', 'keydown', 'mousemove', 'scroll'].forEach(ev => {
                    document.addEventListener(ev, resetInactivityTimer_, { passive: true });
                });
                nextTick(() => initKanbanDragDrop());
            }

            // ── Init ──
            onMounted(async () => {
                // Apply saved theme
                try {
                    const saved = localStorage.getItem('crm-theme');
                    if (saved) setTheme(saved); else setTheme('dark');
                } catch (e) { setTheme('dark'); }

                // Check existing session
                await loadUser();

                if (isLoggedIn.value) {
                    // Valid session — load CRM data
                    await Promise.all([loadLeads(), loadCatalogs(), loadPricing()]);
                    loadStats();
                    loadActiveAEs();
                    loadRoutingConfig();
                    loadSchema();
                    loadPricingConfig();
                    loadFieldLayout();
                    loadPlantillas();

                    ['click', 'keydown', 'mousemove', 'scroll'].forEach(ev => {
                        document.addEventListener(ev, resetInactivityTimer_, { passive: true });
                    });
                    nextTick(() => initKanbanDragDrop());
                }

                loading.value = false;
            });

            // Cleanup event listeners y timers al desmontar (fix MEM #1)
            onUnmounted(() => {
                ['click', 'keydown', 'mousemove', 'scroll'].forEach(ev => {
                    document.removeEventListener(ev, resetInactivityTimer_);
                });
                if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
                if (inactivityTimeout) { clearTimeout(inactivityTimeout); inactivityTimeout = null; }
            });

            return {
                // Auth
                isLoggedIn, loginEmail, loginPassword, loginError, loginLoading,
                handleLogin, handleLogout,
                // State
                loading, refreshing, saving, savingCatalog, savingHMN, savingUsers,
                sidebarCollapsed, currentView, viewMode, searchQuery, filterStatus, filterDealStatus,
                currentPage, currentNegPage, isDark, modalTab, showLeadModal, activeCatalog,
                activeConfigCategory, configValuesList, roundRobinQueue, savingRROrder,
                leads, deals, vendedoresList, catalogs, pricing, currentUser, stats,
                selectedLead, editLead, leadHistory, editingCatalogValues,
                isCreating, creationType,
                userRole, userConnected, clockInTime, clockTimer, activeAEs,
                // Deal Product Lines (Phase 10)
                dealProductLines, savingProducts, dealClassification,
                toast,
                // Handoff
                showHandoffModal, handoffLead, handoffData,
                // Email Compose
                showEmailCompose, emailForm, sendingEmail,
                emailAttachments, emailAttachmentSizeMB,
                // HMN & Users
                hmnVariables, allUsers, newUserEmail, newUserNombre, newUserRol,
                // Reportes
                reportData, reportLoading, reportError, dateRange, comparisonRange, compareType,
                openSections, reportSections, reportViewMode,
                embudoRows, incontactablesRows, crossSellingRows,
                semaforoContestoGrid, semaforoNoContestoGrid, maxToquesContesto, maxToquesNoContesto,
                sinRespuestaRows, razonesNoPasoRows, razonesPerdioRows, dealsReportRows, dealsLossRows, dealsVelocity, sdrRankingRows, aeRankingRows,
                // Phase 22: Full AE Report
                fullAESummary, fullAEFunnel, fullAEProyeccion, fullAERazones, fullAEContacto, fullAECrossRecompra,
                customPrevRange,
                semaforoSegment,
                matrizPivotMode,
                getSegmentValue, formatAmount,
                // Computed
                navItems, currentPageTitle, userInitials,
                kanbanStatuses, filteredLeads, totalPages, paginatedLeads,
                filteredDeals, totalDealPages, paginatedDeals,
                catalogNames, filteredCatalogNames, configCategories,
                uniqueRegions, uniqueMembershipTypes, uniqueAttractions,
                computedPricing, comparisonLabel,
                showQuickCalendar, quickCalForm,
                showEventDetails, selectedEventData,
                isReadOnlySdrFields, calculoMontoAproximado,
                sdrList, aeList, managerList,
                // Methods
                getLeadsByStatus, getFilteredLeadsByStatus, getStatusColor,
                toggleTheme, setTheme,
                openLeadDetail, closeLeadModal, saveLeadChanges, onToqueChange, onAeToqueChange,
                openCreateLead, openCreateDeal, submitCreation,
                handleClockIn, handleClockOut, loadActiveAEs,
                saveCatalog, showToast, formatDate, formatNotes,
                refreshData,
                openQuickCalendar, saveQuickCalendar,
                submitEventDetailsUpdate, deleteEventFromCalendar,
                routingConfig, savingRouting, saveRoutingRules, saveRoundRobinOrder,
                // Phase 3B: Schema Discovery
                schemaData, refreshSchema,
                // Phase 8: Pricing Global + Field Layout
                pricingConfig, savingPricing, savePricingConfigFn,
                fieldLayoutLead, fieldLayoutDeal, leadSections, dealSections, getFieldOptions,
                fieldLayoutEditType, fieldLayoutEditFields, savingFieldLayout,
                editLayoutSections, allSectionNames,
                startEditFieldLayout, moveFieldUp, moveFieldDown, changeFieldSection, saveFieldLayoutFn,
                newSectionName, newSectionIcon, createNewSection, renameSection, deleteSection, moveSectionUp, moveSectionDown,
                pageSize,
                // Handoff methods
                openHandoffModal, cancelHandoff, submitHandoff, isDealPendingReview, getAeDisplayName, handoffMontoEstimado,
                showHandoffModal, handoffLead, handoffData,
                // Email Compose methods
                openEmailCompose, closeEmailCompose, sendEmail,
                handleAttachmentSelect, removeAttachment,
                // HMN & User methods
                loadHMN, saveHMN, loadAllUsers, addUser, toggleUserActive, updateUserRole,
                // Report methods
                generateReport, cancelReport, toggleSection, scrollToSection, formatDateYMD,
                // Deal Product Lines methods (Phase 10)
                addProductLine, removeProductLine, productLineSubtotal, productLinesTotal, saveDealProducts,
                insertNoteTemplate,
                customResponses, saveCustomResponses: saveCustomResponses_,
                // Phase 21: Duplicates
                leadDuplicates, loadingDuplicates,
                // Phase 23/v3.2: Plantillas Per-User (notas + email)
                userPlantillas, showPlantillaForm, plantillaForm, allPlantillasForDropdown,
                emailPlantillasForDropdown, showPlantillasInFicha, fichaPlantillasTipo, currentVendedorId,
                showEmailPlantillaPanel, showCalPlantillaPanel,
                loadPlantillas, openPlantillaForm, savePlantillaForm, deletePlantillaItem, insertEmailTemplate,
            };
        }
    });

    app.mount('#app');
</script>
