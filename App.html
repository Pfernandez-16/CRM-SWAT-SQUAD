<script>
    /*************************************************************
     *  App.html — Vue 3 Application for CRM SWAT Squad
     *  All components, state, and logic in a single file.
     *************************************************************/

    const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick, toRaw } = Vue;

    const app = createApp({
        setup() {
            // ── State ──
            const loading = ref(true);
            const refreshing = ref(false);
            const saving = ref(false);
            const savingCatalog = ref(false);
            const sidebarCollapsed = ref(false);
            const currentView = ref('dashboard');
            const viewMode = ref('table'); // 'table' or 'kanban'
            const searchQuery = ref('');
            const filterStatus = ref('');
            const currentPage = ref(1);
            const pageSize = 50;
            const isDark = ref(true);
            const modalTab = ref('Info');
            const showLeadModal = ref(false);
            const activeCatalog = ref('');
            const activeConfigCategory = ref('general');

            // ── Handoff Modal (Ficha de Negociación) ──
            const showHandoffModal = ref(false);
            const handoffLead = ref({});
            const handoffData = reactive({
                necesidad_puntual: '',
                necesita_decision_tercero: '',
                tiene_presupuesto: '',
                monto_presupuesto: '',
                notas_bandeja_plata: '',
                aeEmail: ''
            });

            // ── Email Compose Modal ──
            const showEmailCompose = ref(false);
            const sendingEmail = ref(false);
            const emailForm = reactive({
                to: '',
                subject: '',
                body: '',
                entityId: '',
                entityType: 'lead'
            });
            const emailAttachments = ref([]);
            let quillInstance = null;

            // ── Quick Calendar Modal ──
            const showQuickCalendar = ref(false);
            const quickCalForm = reactive({ tipo: 'Evento', asunto: '', fecha: '', hora: '', notificationMinutes: 30, visibility: 'DEFAULT' });
            let fullCalendarInstance = null;

            // ── Event Details Modal ──
            const showEventDetails = ref(false);
            const selectedEventData = reactive({
                id: '', title: '', start: '', end: '', type: '',
                startLocal: '', endLocal: '',
                description: '', notificationMinutes: 30, visibility: 'DEFAULT'
            });

            const emailAttachmentSizeMB = computed(function () {
                var total = 0;
                for (var i = 0; i < emailAttachments.value.length; i++) {
                    total += emailAttachments.value[i].size || 0;
                }
                return parseFloat((total / 1024 / 1024).toFixed(2));
            });

            // ── HMN Config ──
            const hmnVariables = ref({});
            const savingHMN = ref(false);

            // ── User Management ──
            const allUsers = ref([]);
            const savingUsers = ref(false);
            const newUserEmail = ref('');
            const newUserNombre = ref('');
            const newUserRol = ref('SDR');

            const leads = ref([]);
            const deals = ref([]);
            const vendedoresList = ref([]);
            const catalogs = ref({});
            const pricing = ref([]);
            const currentUser = ref({ email: '', nombre: '', rol: 'GUEST', sheetId: '' });
            const userRole = computed(() => currentUser.value.rol || 'GUEST');

            // Read-only flag: true when AE is viewing a Deal (SDR fields are not editable)
            const isReadOnlySdrFields = computed(function () {
                var role = userRole.value;
                var src = selectedLead.value._source;
                if (role !== 'AE') return false;
                if (src === 'deal') return true;
                if (src === 'cross_deal') return true;
                return false;
            });

            // ── Phase 1.4: Role-filtered vendor lists ──
            const sdrList = computed(function () {
                return vendedoresList.value.filter(function (v) {
                    return String(v.rol || '').toUpperCase().indexOf('SDR') !== -1;
                });
            });
            const aeList = computed(function () {
                return vendedoresList.value.filter(function (v) {
                    var r = String(v.rol || '').toUpperCase();
                    return r.indexOf('AE') !== -1 || r.indexOf('ACCOUNT EXECUTIVE') !== -1;
                });
            });
            const managerList = computed(function () {
                return allUsers.value.filter(function (u) {
                    var r = String(u.rol || '').toUpperCase();
                    return r === 'GERENTE' || r === 'ADMIN';
                });
            });

            // ── Pricing: Monto Aproximado auto-calculation (SDR) ──
            const calculoMontoAproximado = computed(function () {
                var tipo = String(editLead['Tipo de Cliente'] || '').trim();
                var ticket = parseFloat(editLead['Ticket Promedio']) || 0;
                var licencias = parseFloat(editLead['Licencias Promedio']) || 0;
                if (!tipo || ticket === 0) return 0;
                if (tipo === 'Fichas Mensuales (FEE)') return ticket * 12;
                if (tipo === 'Proyectos') return ticket;
                if (tipo === 'SaaS') return ticket * licencias * 12;
                return 0;
            });
            const userConnected = ref(false);
            const clockInTime = ref(null);
            const clockTimer = ref('');
            const activeAEs = ref([]);
            let clockInterval = null;
            let inactivityTimeout = null;
            const INACTIVITY_LIMIT_MS = 30 * 60 * 1000; // 30 minutes
            const stats = ref({ total: 0, thisWeek: 0, thisMonth: 0, byStatus: {}, byCalidad: {}, byVendedor: {} });
            const routingConfig = reactive({ aeAssignmentMode: 'SDR_CHOICE', managerEmail: '', lastSdrRRSavedEmail: '', lastAeRRSavedEmail: '' });
            const savingRouting = ref(false);
            const selectedLead = ref({});
            const editLead = reactive({});
            const leadHistory = reactive({ pipeline: [], leads: [], deals: [], loading: false });
            const editingCatalogValues = ref([]);

            // ── Creation Mode ──
            const isCreating = ref(false);
            const creationType = ref('lead'); // 'lead' or 'deal'

            const calendarDate = ref(new Date());

            // ── Reportes State ──
            const reportData = ref(null);
            const reportLoading = ref(false);
            const reportError = ref(null);
            const dateRange = ref({ start: null, end: null });
            const comparisonRange = ref({ start: null, end: null });
            const compareType = ref('prev_period'); // 'prev_period' | 'yoy'
            const openSections = ref(['embudoGeneral']); // Embudo opens by default
            let flatpickrInstance = null;

            const reportSections = [
                { id: 'embudoGeneral', label: 'Embudo General' },
                { id: 'incontactables', label: 'Incontactables' },
                { id: 'crossSelling', label: 'Cross Selling' },
                { id: 'matrizContactabilidad', label: 'Matriz de Contactabilidad' },
                { id: 'semaforoContesto', label: 'Semáforo Contestó' },
                { id: 'semaforoNoContesto', label: 'Semáforo No Contestó' },
                { id: 'sinRespuesta', label: 'Sin Respuesta 6to Toque' },
                { id: 'noPasoVentas', label: 'Por qué no pasó a Ventas' },
                { id: 'perdioVenta', label: 'Por qué perdió la venta' }
            ];

            const matrizPivotMode = ref('product'); // 'product' | 'country'

            // ── Report Data Arrays ──
            const embudoRows = computed(() => {
                if (!reportData.value || !reportData.value.embudoGeneral) return [];
                const eg = reportData.value.embudoGeneral;
                const rawRows = [
                    { label: 'Total Leads', metric: eg.totalLeads, type: 'count' },
                    { label: 'Contactables', metric: eg.contactables, type: 'count' },
                    { label: 'Contactados', metric: eg.contactados, type: 'count' },
                    { label: 'Con Respuesta', metric: eg.conRespuesta, type: 'count' },
                    { label: 'Dialogo Completo', metric: eg.dialogoCompleto, type: 'count' },
                    { label: 'Dialogo Intermitente', metric: eg.dialogoIntermitente, type: 'count' },
                    { label: 'Interes', metric: eg.interes, type: 'count' },
                    { label: 'Descartados', metric: eg.descartados, type: 'count' },
                    { label: 'Asignados a Ventas', metric: eg.asignadosVentas, type: 'count' },
                    { label: 'Carry Over', metric: eg.carryOver, type: 'count' },
                    { label: 'Monto Inversion', metric: eg.montosInversion, type: 'amount' },
                    { label: 'Deals Cerrados', metric: eg.dealsCerrados, type: 'count' },
                    { label: 'Monto Cierres', metric: eg.montoCierres, type: 'amount' }
                ];
                // Enrich with inter-stage conversion rate (CVR)
                for (let i = 0; i < rawRows.length; i++) {
                    if (i === 0 || rawRows[i].type === 'amount') {
                        rawRows[i].cvrInterEtapa = null; // no CVR for top-of-funnel or amounts
                    } else {
                        const prevCount = rawRows[i - 1].metric?.total?.count || 0;
                        const currCount = rawRows[i].metric?.total?.count || 0;
                        rawRows[i].cvrInterEtapa = prevCount > 0
                            ? (currCount / prevCount * 100).toFixed(1)
                            : '0.0';
                    }
                }
                return rawRows;
            });

            const incontactablesRows = computed(() => {
                if (!reportData.value || !reportData.value.incontactables) return [];
                const inc = reportData.value.incontactables;
                return [
                    { label: 'Duplicado', metric: inc.duplicado, type: 'count' },
                    { label: 'Equivocado', metric: inc.equivocado, type: 'count' },
                    { label: 'SPAM', metric: inc.spam, type: 'count' }
                ];
            });

            const crossSellingRows = computed(() => {
                if (!reportData.value || !reportData.value.crossSelling) return [];
                const cs = reportData.value.crossSelling;
                return [
                    { label: 'Cross Sell Deals', metric: cs.crossSellDeals, type: 'count' }
                ];
            });

            const semaforoContestoGrid = computed(() => {
                if (!reportData.value || !reportData.value.semaforoContesto) return [];
                const sc = reportData.value.semaforoContesto;
                return [
                    { channel: 'Telefono', toques: [sc.telefono.toque1, sc.telefono.toque2, sc.telefono.toque3] },
                    { channel: 'WhatsApp', toques: [sc.whatsapp.toque1, sc.whatsapp.toque2, sc.whatsapp.toque3] },
                    { channel: 'Correo', toques: [sc.correo.toque1, sc.correo.toque2, sc.correo.toque3, sc.correo.toque4] }
                ];
            });

            const maxToquesContesto = 4;

            const semaforoNoContestoGrid = computed(() => {
                if (!reportData.value || !reportData.value.semaforoNoContesto) return [];
                const snc = reportData.value.semaforoNoContesto;
                return [
                    { channel: 'Telefono', toques: [snc.telefono.toque1, snc.telefono.toque2, snc.telefono.toque3] },
                    { channel: 'WhatsApp', toques: [snc.whatsapp.toque1, snc.whatsapp.toque2, snc.whatsapp.toque3] }
                ];
            });

            const maxToquesNoContesto = 3;

            const sinRespuestaRows = computed(() => {
                if (!reportData.value || !reportData.value.sinRespuesta6toToque) return [];
                const sr = reportData.value.sinRespuesta6toToque;
                return [
                    { label: 'Sin Respuesta (6+ toques)', metric: sr.sinRespuesta, type: 'count' }
                ];
            });

            const razonesNoPasoRows = computed(() => {
                if (!reportData.value || !reportData.value.razonesNoPasoVentas) return [];
                const rnp = reportData.value.razonesNoPasoVentas;
                const totalBase = rnp._totalDescartados?.total?.count || 0;
                const calcMix = (metric) => totalBase > 0 ? ((metric?.total?.count || 0) / totalBase * 100).toFixed(1) : '0.0';
                return [
                    { label: 'No perfil adecuado', metric: rnp.noPerfilAdecuado, type: 'count', mixPct: calcMix(rnp.noPerfilAdecuado) },
                    { label: 'Sin presupuesto', metric: rnp.sinPresupuesto, type: 'count', mixPct: calcMix(rnp.sinPresupuesto) },
                    { label: 'Sin interes genuino', metric: rnp.sinInteresGenuino, type: 'count', mixPct: calcMix(rnp.sinInteresGenuino) },
                    { label: 'Necesita tercero para decidir', metric: rnp.necesitaTercero, type: 'count', mixPct: calcMix(rnp.necesitaTercero) },
                    { label: 'No entendio info marketing', metric: rnp.noEntendioMarketing, type: 'count', mixPct: calcMix(rnp.noEntendioMarketing) },
                    { label: 'Otros', metric: rnp.otros, type: 'count', mixPct: calcMix(rnp.otros) },
                    { label: 'Total Descartados', metric: rnp._totalDescartados, type: 'count', isSummary: true, mixPct: '100.0' }
                ];
            });

            const razonesPerdioRows = computed(() => {
                if (!reportData.value || !reportData.value.razonesPerdioVenta) return [];
                const rpv = reportData.value.razonesPerdioVenta;
                const totalBase = rpv._totalPerdidas?.total?.count || 0;
                const calcMix = (metric) => totalBase > 0 ? ((metric?.total?.count || 0) / totalBase * 100).toFixed(1) : '0.0';
                return [
                    { label: 'Sin presupuesto', metric: rpv.sinPresupuesto, type: 'count', mixPct: calcMix(rpv.sinPresupuesto) },
                    { label: 'Eligio competidor', metric: rpv.eligioCompetidor, type: 'count', mixPct: calcMix(rpv.eligioCompetidor) },
                    { label: 'No responde', metric: rpv.noResponde, type: 'count', mixPct: calcMix(rpv.noResponde) },
                    { label: 'Timing inadecuado', metric: rpv.timingInadecuado, type: 'count', mixPct: calcMix(rpv.timingInadecuado) },
                    { label: 'No tiene poder de decision', metric: rpv.noTienePoderDecision, type: 'count', mixPct: calcMix(rpv.noTienePoderDecision) },
                    { label: 'Producto no se ajusta', metric: rpv.productoNoSeAjusta, type: 'count', mixPct: calcMix(rpv.productoNoSeAjusta) },
                    { label: 'Cambio de prioridades', metric: rpv.cambioPrioridades, type: 'count', mixPct: calcMix(rpv.cambioPrioridades) },
                    { label: 'Mala experiencia previa', metric: rpv.malaExperienciaPrevia, type: 'count', mixPct: calcMix(rpv.malaExperienciaPrevia) },
                    { label: 'Precio muy alto', metric: rpv.precioMuyAlto, type: 'count', mixPct: calcMix(rpv.precioMuyAlto) },
                    { label: 'Proceso interno largo', metric: rpv.procesoInternoLargo, type: 'count', mixPct: calcMix(rpv.procesoInternoLargo) },
                    { label: 'Se fue con otra solucion', metric: rpv.seFueConOtraSolucion, type: 'count', mixPct: calcMix(rpv.seFueConOtraSolucion) },
                    { label: 'No era el perfil', metric: rpv.noEraElPerfil, type: 'count', mixPct: calcMix(rpv.noEraElPerfil) },
                    { label: 'Empresa cerro', metric: rpv.empresaCerro, type: 'count', mixPct: calcMix(rpv.empresaCerro) },
                    { label: 'Sin especificar', metric: rpv.sinEspecificar, type: 'count', mixPct: calcMix(rpv.sinEspecificar) },
                    { label: 'Total Perdidas', metric: rpv._totalPerdidas, type: 'count', isSummary: true, mixPct: '100.0' }
                ];
            });

            const semaforoSegment = ref('total');

            function getSegmentValue(metric, segment) {
                if (!metric || !metric[segment]) return { count: 0, pct: '0.0', delta: '0.0' };
                return metric[segment];
            }

            function formatAmount(val) {
                if (!val && val !== 0) return '$0';
                return '$' + Number(val).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            }

            const toast = reactive({ show: false, message: '', type: 'info' });

            // ── Navigation ──
            const navItems = computed(() => [
                { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
                { id: 'leads', icon: 'list_alt', label: 'Prospectos', badge: leads.value.length || null },
                { id: 'negociaciones', icon: 'handshake', label: 'Negociaciones', badge: deals.value.length || null },
                { id: 'reportes', icon: 'assessment', label: 'Reportes' },
                { id: 'calendar', icon: 'calendar_month', label: 'Calendario' },
                { id: 'config', icon: 'settings', label: 'Configuración' },
                { id: 'account', icon: 'person', label: 'Cuenta' },
            ]);

            const currentPageTitle = computed(() => {
                const titles = {
                    dashboard: 'Dashboard', leads: 'Prospectos', negociaciones: 'Negociaciones',
                    reportes: 'Reportes', calendar: 'Calendario', config: 'Configuración', account: 'Cuenta'
                };
                return titles[currentView.value] || '';
            });

            // ── User ──
            const userInitials = computed(() => {
                const email = currentUser.value.email || 'U';
                return email.substring(0, 2).toUpperCase();
            });

            // ── Kanban ──
            const sdrKanbanStatuses = computed(() => catalogs.value['Status'] || []);
            const aeKanbanStatuses = computed(() => catalogs.value['Status de Venta'] || []);

            // Kanban statuses depend on which view is active, not the user role
            const kanbanStatuses = computed(() => {
                if (currentView.value === 'negociaciones') return aeKanbanStatuses.value;
                return sdrKanbanStatuses.value;
            });

            const activeDataset = computed(() => {
                if (currentView.value === 'negociaciones') return deals.value;
                return leads.value;
            });

            // Kanban: get items by status for the active view
            function getLeadsByStatus(status) {
                const isNeg = currentView.value === 'negociaciones';
                let items;
                if (isNeg) {
                    items = deals.value.filter(d => (d['Status de Venta'] || '').trim() === status);
                    items.forEach(d => { d._source = 'deal'; });
                } else {
                    items = leads.value.filter(l => (l._colW_Status || '').trim() === status);
                    items.forEach(l => { l._source = 'lead'; });
                }
                return items;
            }

            function getFilteredLeadsByStatus(status) {
                let items = getLeadsByStatus(status);
                if (searchQuery.value) {
                    const q = searchQuery.value.toLowerCase();
                    items = items.filter(l =>
                        (l._name || '').toLowerCase().includes(q) ||
                        (l._empresa || '').toLowerCase().includes(q) ||
                        (l._email || '').toLowerCase().includes(q) ||
                        (l._tel || '').toLowerCase().includes(q) ||
                        String(l._id).includes(q)
                    );
                }
                return items;
            }

            // ── Prospectos (SDR) List ──
            const filteredLeads = computed(() => {
                let items = leads.value;
                if (filterStatus.value) {
                    items = items.filter(l => l._colW_Status === filterStatus.value);
                }
                if (searchQuery.value) {
                    const q = searchQuery.value.toLowerCase();
                    items = items.filter(l =>
                        (l._name || '').toLowerCase().includes(q) ||
                        (l._empresa || '').toLowerCase().includes(q) ||
                        (l._email || '').toLowerCase().includes(q) ||
                        (l._tel || '').toLowerCase().includes(q) ||
                        String(l._id).includes(q)
                    );
                }
                return items;
            });

            const totalPages = computed(() => Math.ceil(filteredLeads.value.length / pageSize) || 1);

            const paginatedLeads = computed(() => {
                const start = (currentPage.value - 1) * pageSize;
                return filteredLeads.value.slice(start, start + pageSize);
            });

            // ── Negociaciones (AE) List ──
            const currentNegPage = ref(1);
            const filterDealStatus = ref('');

            const filteredDeals = computed(() => {
                let items = deals.value;
                if (filterDealStatus.value) {
                    items = items.filter(d => d['Status de Venta'] === filterDealStatus.value);
                }
                if (searchQuery.value) {
                    const q = searchQuery.value.toLowerCase();
                    items = items.filter(d =>
                        (d._name || '').toLowerCase().includes(q) ||
                        (d._empresa || '').toLowerCase().includes(q) ||
                        (d._email || '').toLowerCase().includes(q) ||
                        (d._tel || '').toLowerCase().includes(q) ||
                        String(d._id).includes(q)
                    );
                }
                return items;
            });

            const totalDealPages = computed(() => Math.ceil(filteredDeals.value.length / pageSize) || 1);

            const paginatedDeals = computed(() => {
                const start = (currentNegPage.value - 1) * pageSize;
                return filteredDeals.value.slice(start, start + pageSize);
            });

            // ── Status Colors ──
            const statusColorMap = {
                'Nuevo': '#6c63ff',
                'Contactado sin Respuesta': '#ff6b6b',
                'En Seguimiento': '#f5a623',
                'Reagendar': '#4fc3f7',
                'Tocar en el futuro': '#a78bfa',
                'Paso a Ventas': '#00d68f',
                'Cross Selling': '#00bcd4',
                'Perdido': '#8b5cf6',
                'Resucitado': '#ff9800',
            };

            function getStatusColor(status) {
                return statusColorMap[status] || '#8892b0';
            }

            // ── Pricing Computed ──
            const uniqueRegions = computed(() => [...new Set(pricing.value.map(p => p.region))]);
            const uniqueMembershipTypes = computed(() => [...new Set(pricing.value.map(p => p.membershipType))]);
            const uniqueAttractions = computed(() => [...new Set(pricing.value.map(p => p.attraction))]);

            const computedPricing = computed(() => {
                const r = editLead['¿Cual es su región?'];
                const m = editLead['¿Que tipo de membresía es?'];
                const a = editLead['Pricing Tier'];
                if (!r || !m || !a) return null;
                const match = pricing.value.find(p =>
                    p.region === r && p.membershipType === m && p.attraction === a
                );
                return match || null;
            });

            const comparisonLabel = computed(() => {
                if (!comparisonRange.value.start || !comparisonRange.value.end) return '';
                const fmt = (d) => d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
                return 'Comparando vs: ' + fmt(comparisonRange.value.start) + ' - ' + fmt(comparisonRange.value.end);
            });

            // ── Catalog Names ──
            const catalogNames = computed(() => Object.keys(catalogs.value).filter(k => k.trim()));

            // ── Config Categories ──
            const configCategoryMap = {
                general: {
                    label: '⚙️ General & Status',
                    keys: ['Status', 'Calidad de Contacto', 'Vendedor Asignado para Seguimiento']
                },
                calificacion: {
                    label: '📊 Lead Scoring',
                    keys: ['¿Cuál es tu necesidad puntual?', '¿Entendió la información de Marketing?', '¿Mostró Interés genuino?', '¿El perfil del prospecto es el adecuado?', '¿Tienes presupuesto asignado para este proyecto, en este año?', '¿han sido parte de alguna asociación de la industria?', '¿Necesitas tocar base con alguién para decidir la compra?']
                },
                seguimiento: {
                    label: '📞 Seguimiento',
                    keys: ['Toques de Contactación', 'Tipo de Seguimiento', 'Toques de Seguimiento', 'Status del Seguimiento', 'Razón de pérdida']
                },
                pricing: {
                    label: '💰 Pricing',
                    keys: ['¿Cual es su región?', '¿Que tipo de membresía es?', 'Pricing Tier']
                }
            };

            const filteredCatalogNames = computed(() => {
                const cat = activeConfigCategory.value;
                const allNames = catalogNames.value;
                if (configCategoryMap[cat]) {
                    return allNames.filter(n => configCategoryMap[cat].keys.includes(n));
                }
                // 'otros' — show any catalog not in known categories
                const allKnown = Object.values(configCategoryMap).flatMap(c => c.keys);
                return allNames.filter(n => !allKnown.includes(n));
            });

            const configCategories = computed(() => {
                const cats = Object.entries(configCategoryMap).map(([id, c]) => ({ id, label: c.label }));
                // Check for "Otros"
                const allKnown = Object.values(configCategoryMap).flatMap(c => c.keys);
                const hasOthers = catalogNames.value.some(n => !allKnown.includes(n));
                if (hasOthers) cats.push({ id: 'otros', label: '📁 Otros' });
                return cats;
            });

            // ── Calendar (FullCalendar.js Integration) ──
            function initFullCalendar() {
                const el = document.getElementById('fullcalendar-container');
                if (!el) return;

                if (fullCalendarInstance) {
                    fullCalendarInstance.destroy(); // Destruye la instancia previa atada al DOM antiguo
                }

                fullCalendarInstance = new FullCalendar.Calendar(el, {
                    initialView: 'dayGridMonth',
                    locale: 'es',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,listWeek'
                    },
                    buttonText: {
                        today: 'Hoy', month: 'Mes', week: 'Semana', list: 'Lista'
                    },
                    height: 'auto',
                    selectable: true,
                    selectMirror: true,
                    // Click o drag sobre fechas vacías → abre Quick Calendar
                    select: function (info) {
                        var startDate = info.startStr.split('T')[0];
                        var startTime = info.startStr.includes('T') ? info.startStr.split('T')[1].substring(0, 5) : '';
                        openQuickCalendar('Agendado desde Calendario', startDate, startTime);
                        fullCalendarInstance.unselect();
                    },
                    // Click sobre evento existente → abre modal de detalles
                    eventClick: function (info) {

                        selectedEventData.id = ev.extendedProps && ev.extendedProps.id ? ev.extendedProps.id : (ev.id || '');
                        selectedEventData.title = ev.title;
                        selectedEventData.start = ev.startStr;
                        selectedEventData.end = ev.endStr;

                        // Convertir ISO a datetime-local (YYYY-MM-DDTHH:MM)
                        function isoToLocal(isoStr) {
                            if (!isoStr) return '';
                            var d = new Date(isoStr);
                            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
                            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
                                'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
                        }
                        selectedEventData.startLocal = isoToLocal(ev.startStr);
                        selectedEventData.endLocal = isoToLocal(ev.endStr);

                        // Tipo basado en hack de colores
                        var color = ev.backgroundColor;
                        if (color === '#e67c73') selectedEventData.type = 'Tarea';
                        else if (color === '#dc2127') selectedEventData.type = 'Recordatorio';
                        else if (color === '#616161') selectedEventData.type = 'Registro Visual';
                        else selectedEventData.type = 'Evento';

                        // Campos extendidos del backend
                        var props = ev.extendedProps || {};
                        selectedEventData.description = props.description || '';
                        selectedEventData.notificationMinutes = props.notificationMinutes || 30;
                        selectedEventData.visibility = props.visibility || 'DEFAULT';

                        showEventDetails.value = true;
                    },

                        google.script.run
                            .withSuccessHandler(function (json) {
                                try {

                                    if (parsed.status === 'success') {
                                        successCallback(parsed.data);
                                    } else {
                                        failureCallback(parsed.message);
                                    }
                                } catch (e) {
                                    failureCallback('Error parsing events');
                                }
                            })
                            .withFailureHandler(function (err) {
                                failureCallback(err.message || 'Error fetching events');
                            })
                            .getAgentEvents(info.startStr, info.endStr);
                    }
                });

            function generateReport() {
                if (!dateRange.value.start || !dateRange.value.end) return;
                reportLoading.value = true;
                reportError.value = null;
                reportAbortController = new AbortController();

                const dateIn = formatDateYMD(dateRange.value.start);
                const dateOut = formatDateYMD(dateRange.value.end);

                google.script.run
                    .withSuccessHandler(function (jsonString) {
                        if (reportAbortController && reportAbortController.signal.aborted) return;
                        try {
                            const data = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
                            if (data.error) {
                                reportError.value = data.error;
                                reportData.value = null;
                            } else if (data.metadata && data.metadata.totalLeads === 0) {
                                reportData.value = { _empty: true };
                            } else {
                                reportData.value = data;
                                if (data.metadata && data.metadata.previousDateIn && data.metadata.previousDateOut) {
                                    comparisonRange.value = {
                                        start: new Date(data.metadata.previousDateIn),
                                        end: new Date(data.metadata.previousDateOut)
                                    };
                                }
                            }
                        } catch (e) {

                            reportData.value = null;
                        }
                        reportLoading.value = false;
                    })
                    .withFailureHandler(function (error) {
                        if (reportAbortController && reportAbortController.signal.aborted) return;
                        reportError.value = error.message || 'Error desconocido al generar el reporte';
                        reportData.value = null;
                        reportLoading.value = false;

                    google.script.run
                        .withSuccessHandler(function (response) {

                                if (typeof response === 'string') {
                                    response = JSON.parse(response || '{}');
                                }
                                // New format: { leads: [...], deals: [...] }
                                if (response.leads !== undefined) {
                                    leads.value = response.leads || [];
                                    deals.value = response.deals || [];
                                    vendedoresList.value = response.vendedores || [];
                                }
                                // Legacy wrapped format: { status, data: { leads, deals } }
                                else if (response.data && response.data.leads) {
                                    leads.value = response.data.leads || [];
                                    deals.value = response.data.deals || [];
                                }
                                // Oldest fallback: raw array
                                else if (Array.isArray(response)) {
                                    leads.value = response;
                                    deals.value = [];
                                } else if (Array.isArray(response.data)) {
                                    leads.value = response.data;
                                    deals.value = [];
                                }
                                // GLOBAL _source injection (ensures read-only flag works from ANY view)
                                leads.value.forEach(function (l) { l._source = 'lead'; });
                                deals.value.forEach(function (d) { d._source = 'deal'; });
                                if (response.error) {
                                    console.error('[API] getLeads error:', response.error);
                                }
                            } catch (e) {
                                console.error('[DEBUG] Parsing error:', e);
                            }
                            console.log('[DEBUG] Loaded:', leads.value.length, 'leads,', deals.value.length, 'deals.');
                            resolve();
                        })
                        .withFailureHandler(function (err) {
                            console.error('[DEBUG] getLeads FAILED:', err);

            function handleClockIn() {

            function handleClockOut() {
                google.script.run
                    .withSuccessHandler(function (result) {
                        if (result && result.status === 'success') {
                            userConnected.value = false;
                            clockInTime.value = null;
                            clockTimer.value = '';
                            if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
                            if (inactivityTimeout) { clearTimeout(inactivityTimeout); inactivityTimeout = null; }
                            showToast('🔴 Desconectado', 'info');
                        }
                    })
                    .withFailureHandler(function (err) {
                        showToast('Error: ' + err.message, 'error');
                    })
                    .clockOut();
            }

            function startClockTimer_() {
                if (clockInterval) clearInterval(clockInterval);
                clockInterval = setInterval(() => {
                    if (!clockInTime.value) return;
                    const diff = Date.now() - new Date(clockInTime.value).getTime();
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    clockTimer.value = h + 'h ' + String(m).padStart(2, '0') + 'm';
                }, 10000); // Update every 10 sec
            }

            // ── Inactivity Auto-Disconnect ──

                if (inactivityTimeout) clearTimeout(inactivityTimeout);

            // ── Kanban Drag & Drop with SortableJS ──
            function initKanbanDragDrop() {
                if (viewMode.value !== 'kanban') return;

                nextTick(() => {
                    const columns = document.querySelectorAll('.kanban-cards');
                    columns.forEach(col => {
                        if (col._sortable) col._sortable.destroy();

                        col._sortable = new Sortable(col, {
                            group: 'kanban',
                            animation: 300,
                            ghostClass: 'sortable-ghost',
                            chosenClass: 'sortable-chosen',
                            dragClass: 'sortable-drag',
                            easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                            onEnd: function (evt) {
                                const cardEl = evt.item;
                                const newCol = evt.to;
                                const rowNum = parseInt(cardEl.dataset.row, 10);
                                const newStatus = newCol.dataset.status;
                                const cardSource = cardEl.dataset.source || '';

                                if (!rowNum || !newStatus) return;

                                // Determine if this item is a deal or lead
                                const itemIsDeal = cardSource === 'deal';
                                const dataset = itemIsDeal ? deals : leads;
                                const lead = dataset.value.find(l => l._row === rowNum);

                                if (lead) {
                                    const oldStatus = itemIsDeal ? lead['Status de Venta'] : lead._colW_Status;
                                    if (oldStatus === newStatus) return;

                                    // ── HANDOFF: Intercept "Paso a Ventas" with modal instead of confirm() ──
                                    if (!itemIsDeal && newStatus.toLowerCase().trim() === 'paso a ventas') {
                                        openHandoffModal(lead);
                                        // Revert visually for now; the actual move happens after handoff form
                                        nextTick(() => initKanbanDragDrop());
                                        return;
                                    }

                                    // Update locally
                                    if (itemIsDeal) {
                                        lead['Status de Venta'] = newStatus;
                                    } else {
                                        lead._colW_Status = newStatus;
                                        lead['Status'] = newStatus;
                                    }

                                    // Persist status change to backend
                                    google.script.run
                                        .withSuccessHandler(function (result) {
                                            if (result && result.triggerError) {
                                                if (itemIsDeal) {
                                                    lead['Status de Venta'] = oldStatus;
                                                } else {
                                                    lead._colW_Status = oldStatus;
                                                    lead['Status'] = oldStatus;
                                                }
                                                showToast('Error al mover: ' + result.triggerError, 'error');
                                            } else {
                                                const labelPrefix = itemIsDeal ? 'Deal #' : 'Lead #';
                                                showToast(labelPrefix + (lead._id || rowNum) + ' → ' + newStatus, 'success');
                                                loadStats();
                                            }
                                        })
                                        .withFailureHandler(function (err) {
                                            if (itemIsDeal) {
                                                lead['Status de Venta'] = oldStatus;
                                            } else {
                                                lead._colW_Status = oldStatus;
                                                lead['Status'] = oldStatus;
                                            }
                                            showToast('Error al mover: ' + err.message, 'error');
                                        })
                                        .updateLeadField(rowNum, itemIsDeal ? 'Status de Venta' : 'Status', newStatus, itemIsDeal);
                                }
                            }
                        });
                    });
                });
            }

            function sendEmail() {
                // Get HTML content from Quill
                var htmlBody = '';
                var plainText = '';
                if (quillInstance) {
                    htmlBody = quillInstance.root.innerHTML || '';
                    plainText = quillInstance.getText() || '';
                }

                if (!emailForm.to || !emailForm.subject || (!htmlBody && !plainText)) {
                    showToast('Todos los campos son obligatorios (Para, Asunto, Cuerpo).', 'error');
                    return;
                }

                if (emailAttachmentSizeMB.value > 20) {
                    showToast('⚠️ Los adjuntos exceden el límite de 20 MB.', 'error');
                    return;
                }

                sendingEmail.value = true;

                // Process attachments to Base64
                var filesToProcess = emailAttachments.value.slice();
                var processedAttachments = [];
                var filesProcessed = 0;

                function doSend() {
                    google.script.run
                        .withSuccessHandler(function (result) {
                            sendingEmail.value = false;
                            if (result && result.status === 'success') {
                                showToast('✅ ' + result.message, 'success');
                                closeEmailCompose();
                            } else {
                                showToast('❌ ' + (result.message || 'Error desconocido'), 'error');
                            }
                        })
                        .withFailureHandler(function (err) {
                            sendingEmail.value = false;
                            showToast('❌ Error al enviar correo: ' + err.message, 'error');
                        })
                        .sendDirectEmail(
                            emailForm.to,
                            emailForm.subject,
                            plainText,
                            emailForm.entityId,
                            emailForm.entityType,
                            htmlBody,
                            processedAttachments
                        );
                }

                if (filesToProcess.length === 0) {
                    doSend();
                } else {
                    // Read all files as Base64 before sending
                    for (var i = 0; i < filesToProcess.length; i++) {
                        (function (file) {
                            var rawFile = typeof Vue !== 'undefined' && Vue.toRaw ? Vue.toRaw(file) : file;
                            var reader = new FileReader();
                            reader.onload = function (e) {
                                var base64 = e.target.result.split(',')[1]; // strip data:...;base64,
                                processedAttachments.push({
                                    filename: rawFile.name,
                                    mimeType: rawFile.type || 'application/octet-stream',
                                    data: base64
                                });
                                filesProcessed++;
                                if (filesProcessed === filesToProcess.length) {
                                    doSend();
                                }
                            };
                            reader.onerror = function () {
                                sendingEmail.value = false;
                                showToast('❌ Error al leer archivo: ' + rawFile.name, 'error');
                            };
                            reader.readAsDataURL(rawFile);
                        })(filesToProcess[i]);
                    }
                }
            }

                google.script.run
                    .withSuccessHandler(function (result) {
                        if (result && result.status === 'success') {
                            user.activo = !user.activo;
                            showToast(user.activo ? '✅ Usuario activado' : '🟡 Usuario desactivado', 'info');
                        }
                    })
                    .withFailureHandler(function (err) { showToast('❌ Error: ' + err.message, 'error'); })
                    .toggleUserActive(user.email);
            }

            function updateUserRole(user, newRole) {
                google.script.run
                    .withSuccessHandler(function (result) {
                        if (result && result.status === 'success') {
                            user.rol = newRole;
                            showToast('✅ Rol actualizado a ' + newRole, 'success');
                        }
                    })
                    .withFailureHandler(function (err) { showToast('❌ Error: ' + err.message, 'error'); })
                    .updateUserRole(user.email, newRole);
            }

            // Watch for view/mode changes to re-init kanban
            watch(currentView, (newView, oldView) => {
                if (viewMode.value === 'kanban') {
                    nextTick(() => initKanbanDragDrop());
                }
                if (newView === 'leads') currentPage.value = 1;
                if (newView === 'negociaciones') currentNegPage.value = 1;
                if (newView === 'config' && userRole.value === 'ADMIN') {
                    loadHMN();
                    loadAllUsers();
                }
                if (newView === 'reportes') {
                    nextTick(() => {
                        const now = new Date();
                        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);

                        if (flatpickrInstance) { flatpickrInstance.destroy(); flatpickrInstance = null; }

                        flatpickrInstance = flatpickr('.date-range-picker', {
                            mode: 'range',
                            dateFormat: 'Y-m-d',
                            defaultDate: [firstDay, lastDay],
                            locale: { firstDayOfWeek: 1, rangeSeparator: ' a ' },
                            onChange: function (selectedDates) {
                                if (selectedDates.length === 2) {
                                    dateRange.value = { start: selectedDates[0], end: selectedDates[1] };
                                    const diffMs = selectedDates[1].getTime() - selectedDates[0].getTime();
                                    const compEnd = new Date(selectedDates[0].getTime() - 86400000);
                                    const compStart = new Date(compEnd.getTime() - diffMs);
                                    comparisonRange.value = { start: compStart, end: compEnd };
                                }
                            }
                        });

                        // Set initial date range
                        dateRange.value = { start: firstDay, end: lastDay };
                        const diffMs = lastDay.getTime() - firstDay.getTime();
                        const compEnd = new Date(firstDay.getTime() - 86400000);
                        const compStart = new Date(compEnd.getTime() - diffMs);
                        comparisonRange.value = { start: compStart, end: compEnd };

                        // Auto-load current month report
                        generateReport();
                    });
                }
                if (oldView === 'reportes' && flatpickrInstance) {
                    flatpickrInstance.destroy();
                    flatpickrInstance = null;
                }
            });

            watch(viewMode, (newMode) => {
                if (newMode === 'kanban') {
                    nextTick(() => initKanbanDragDrop());
                }
            });

            // ── Init ──
            onMounted(async () => {
                // Apply saved theme
                try {
                    const saved = localStorage.getItem('crm-theme');
                    if (saved) setTheme(saved); else setTheme('dark');
                } catch (e) { setTheme('dark'); }

                // Load all data
                await Promise.all([loadLeads(), loadCatalogs(), loadPricing(), loadUser()]);
                loadStats();
                loadActiveAEs();
                loadRoutingConfig();
                loading.value = false;

                // Set up inactivity listener
                ['click', 'keydown', 'mousemove', 'scroll'].forEach(ev => {
                    document.addEventListener(ev, resetInactivityTimer_, { passive: true });
                });

                nextTick(() => initKanbanDragDrop());
            });

            // Cleanup event listeners y timers al desmontar (fix MEM #1)
            onUnmounted(() => {
                ['click', 'keydown', 'mousemove', 'scroll'].forEach(ev => {
                    document.removeEventListener(ev, resetInactivityTimer_);
                });
                if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
                if (inactivityTimeout) { clearTimeout(inactivityTimeout); inactivityTimeout = null; }
            });

            return {
                // State
                loading, refreshing, saving, savingCatalog, savingHMN, savingUsers,
                sidebarCollapsed, currentView, viewMode, searchQuery, filterStatus, filterDealStatus,
                currentPage, currentNegPage, isDark, modalTab, showLeadModal, activeCatalog,
                activeConfigCategory, configValuesList, roundRobinQueue, savingRROrder,
                leads, deals, vendedoresList, activeDataset, catalogs, pricing, currentUser, stats,
                selectedLead, editLead, leadHistory, editingCatalogValues,
                isCreating, creationType,
                userRole, userConnected, clockInTime, clockTimer, activeAEs,
                toast, calendarDate,
                // Handoff
                showHandoffModal, handoffLead, handoffData,
                // Email Compose
                showEmailCompose, emailForm, sendingEmail,
                emailAttachments, emailAttachmentSizeMB,
                // HMN & Users
                hmnVariables, allUsers, newUserEmail, newUserNombre, newUserRol,
                // Reportes
                reportData, reportLoading, reportError, dateRange, comparisonRange, compareType,
                openSections, reportSections,
                embudoRows, incontactablesRows, crossSellingRows,
                semaforoContestoGrid, semaforoNoContestoGrid, maxToquesContesto, maxToquesNoContesto,
                sinRespuestaRows, razonesNoPasoRows, razonesPerdioRows,
                semaforoSegment,
                matrizPivotMode,
                getSegmentValue, formatAmount,
                // Computed
                navItems, currentPageTitle, userInitials,
                kanbanStatuses, filteredLeads, totalPages, paginatedLeads,
                filteredDeals, totalDealPages, paginatedDeals,
                catalogNames, filteredCatalogNames, configCategories,
                uniqueRegions, uniqueMembershipTypes, uniqueAttractions,
                computedPricing, comparisonLabel,
                showQuickCalendar, quickCalForm,
                showEventDetails, selectedEventData,
                isReadOnlySdrFields, calculoMontoAproximado,
                sdrList, aeList, managerList,
                // Methods
                getLeadsByStatus, getFilteredLeadsByStatus, getStatusColor,
                toggleTheme, setTheme,
                openLeadDetail, closeLeadModal, saveLeadChanges, onToqueChange, onAeToqueChange,
                openCreateLead, openCreateDeal, submitCreation,
                handleClockIn, handleClockOut, loadActiveAEs,
                saveCatalog, showToast, formatDate, formatNotes,
                refreshData,
                openQuickCalendar, saveQuickCalendar,
                submitEventDetailsUpdate, deleteEventFromCalendar,
                routingConfig, savingRouting, saveRoutingRules, saveRoundRobinOrder,
                pageSize,
                // Handoff methods
                openHandoffModal, cancelHandoff, submitHandoff,
                showHandoffModal, handoffLead, handoffData,
                // Email Compose methods
                openEmailCompose, closeEmailCompose, sendEmail,
                handleAttachmentSelect, removeAttachment,
                // HMN & User methods
                loadHMN, saveHMN, loadAllUsers, addUser, toggleUserActive, updateUserRole,
                // Report methods
                generateReport, cancelReport, toggleSection, scrollToSection, formatDateYMD,
            };
        }
    });

    app.mount('#app');
</script>
